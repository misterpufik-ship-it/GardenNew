<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>AI-CRM Garden Lounge</title>
  <link rel="icon" type="image/png" href="/udelnaya/favicon.png">
  <link rel="stylesheet" href="shell.css">
</head>
<body>
  <header class="crm-header">
    <div class="crm-brand">
      <img src="/img/logo3.webp" alt="Garden Lounge" class="crm-logo" width="44" height="44">
      <div class="crm-brand-text">
        <h1>AI-CRM Garden Lounge</h1>
      </div>
    </div>
    <nav class="crm-tabs" role="tablist">
      <button type="button" class="crm-tab active" role="tab" data-tab="sverka" aria-selected="true">Сверка по р/с</button>
      <button type="button" class="crm-tab" role="tab" data-tab="smeny" aria-selected="false">Сверка смен</button>
    </nav>
  </header>

  <main class="crm-main">
    <iframe id="frame-sverka" class="crm-frame active" src="sverka/" title="Сверка по расчётному счёту"></iframe>
    <iframe id="frame-smeny" class="crm-frame" src="smeny/" title="Сверка смен" hidden></iframe>
  </main>

  <script src="shell.js"></script>
</body>
</html>
