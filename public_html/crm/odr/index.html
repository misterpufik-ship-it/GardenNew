<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>ОДР</title>
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1 class="shimmer-gold">ОДР — отчёты по месяцам</h1>
  <p class="subtitle" id="subtitle">Загрузка реестра…</p>

  <details class="panel collapsible">
    <summary>Загрузить отчёт</summary>
    <div class="collapsible-body">
      <label for="reportMonth">Месяц</label>
      <input type="month" id="reportMonth">

      <label for="reportFile" class="field-gap">Файл Excel (.xlsx)</label>
      <input type="file" id="reportFile" accept=".xlsx">

      <label for="reportNote" class="field-gap">Примечание</label>
      <input type="text" id="reportNote" placeholder="Комментарий к отчёту">

      <div class="btn-row">
        <button type="button" class="btn" id="uploadBtn">Загрузить</button>
      </div>
      <p class="msg" id="uploadMsg"></p>
    </div>
  </details>

  <div class="section-actions btn-row">
    <button type="button" class="btn secondary" id="downloadRegistry" disabled>Скачать реестр Excel</button>
  </div>

  <div class="panel">
    <h2>Загруженные отчёты</h2>
    <div class="wrap">
      <table class="data-table" id="reportsTable">
        <thead>
          <tr>
            <th>Месяц</th>
            <th>Файл</th>
            <th>Примечание</th>
            <th>Размер</th>
            <th>Загружен</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <p class="msg" id="emptyMsg">Отчётов пока нет</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="../export-xlsx.js"></script>
  <script src="app.js"></script>
</body>
</html>
