<style>
    /* ОБЩИЕ СТИЛИ */
    .taplink-block-wrapper {
        --bg-deep: #000000;
        --bg-accent: #000000;
        --text-main: #EAEAEA;
        --gold-matte: #C5A059;
        
        width: 100%;
    position: relative;
    left: 0;
    margin-left: 0;
    margin-right: 0;
    overflow: hidden;
        z-index: 10; 
        background-color: var(--bg-deep);
        color: var(--text-main);
        font-family: 'Montserrat', sans-serif;
        margin-top: -2px; 
        overflow: hidden;
    }

    .content-limiter {
        max-width: 600px; 
        margin: 0 auto;
        width: 100%;
        position: relative;
        z-index: 10;
        padding: 60px 20px 30px 20px; 
    }

    .font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }

    .film-grain {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04; pointer-events: none; z-index: 1;
    }

    .shimmer-gold {
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 5s linear infinite;
        display: inline-block;
    }
    @keyframes shine { to { background-position: 200% center; } }

    .fade-up { 
        animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
        opacity: 0; 
        transform: translateY(10px); 
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .promo-card {
        border: 1px solid rgba(197, 160, 89, 0.2);
        background-color: rgba(20, 20, 20, 0.4);
        padding: 22px 20px;
        text-align: center;
        transition: border-color 0.6s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .promo-card:hover {
        border-color: rgba(197, 160, 89, 0.5);
    }

    .gold-line-fade {
        width: 160px;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--gold-matte), transparent);
        margin: 16px auto;
    }

    .bottom-divider {
        display: block;
        max-width: 280px;
        margin: 40px auto 0;
        opacity: 0.7;
    }

    .promo-title {
        font-family: 'Cormorant Garamond', serif !important;
        font-size: 24px !important;
        line-height: 1.15 !important;
        font-weight: 300 !important;
        font-style: italic !important;
        color: #ffffff !important;
        margin: 0 0 8px !important;
    }

    .promo-desc {
        font-family: 'Montserrat', sans-serif !important;
        font-size: 13px !important;
        line-height: 1.7 !important;
        font-weight: 300 !important;
        color: rgba(255, 255, 255, 0.68) !important;
        letter-spacing: 0.035em !important;
        margin: 0 0 16px !important;
        max-width: 360px;
    }

    .promo-offer {
        font-family: 'Montserrat', sans-serif !important;
        font-size: clamp(13px, 1.05vw, 14px) !important;
        line-height: 1.55 !important;
        letter-spacing: 0.18em !important;
        text-transform: uppercase !important;
        font-weight: 600 !important;
        margin: 0 !important;
    }

    .akzii-footer-note {
        font-size: 11px !important;
        line-height: 1.8 !important;
        letter-spacing: 0.4em !important;
        text-transform: uppercase !important;
        font-weight: 500 !important;
    }

    .akzii-footer {
        margin-top: 42px !important;
    }

    @media (min-width: 768px) {
        .promo-card {
            padding: 24px 28px;
        }
    }

    @media (max-width: 767px) {
        .promo-title {
            font-size: 22px !important;
        }

        .promo-desc {
            font-size: 12px !important;
            line-height: 1.65 !important;
            letter-spacing: 0.025em !important;
        }

        .promo-offer {
            font-size: clamp(12px, 3.2vw, 13px) !important;
            line-height: 1.5 !important;
            letter-spacing: 0.12em !important;
        }

        .akzii-footer {
            margin-top: 34px !important;
        }
    }
</style>

<div id="special" class="taplink-block-wrapper">
    <div class="film-grain"></div>

    <div class="content-limiter">
        <header class="text-center mb-12 fade-up">
            <h1 class="font-serif-lux text-3xl text-white font-light italic m-0">
                <cms:show akzii_main_title />
            </h1>
            <div class="gold-line-fade"></div>
            <p class="text-[12px] uppercase tracking-[0.4em] shimmer-gold font-medium m-0">
                <cms:show akzii_sub_title />
            </p>
        </header>

        <div class="space-y-3">
            <cms:show_repeatable 'promo_list'>
                <div class="promo-card fade-up">
                    <h2 class="promo-title">
                        <cms:show promo_name />
                    </h2>
                    <p class="promo-desc">
                        <cms:show promo_desc />
                    </p>
                    <div class="w-6 h-px bg-[#C5A059]/30 mx-auto mb-3"></div>
                    <p class="promo-offer shimmer-gold">
                        <cms:show promo_offer />
                    </p>
                </div>
            </cms:show_repeatable>
        </div>

        <footer class="akzii-footer mt-8 text-center fade-up">
            <p class="akzii-footer-note m-0 italic shimmer-gold">
                <cms:show akzii_footer />
            </p>
        </footer>

        <div class="fade-up">
            <img src="<cms:if akzii_sep='https://misterpufik.ru/div.png'>couch/uploads/image/div.webp<cms:else /><cms:show akzii_sep /></cms:if>" alt="Разделитель" class="bottom-divider" loading="lazy" decoding="async">
        </div>
    </div>
</div>
