<style>
    :root {
        --bg-color: #000000;
        --gold: #C5A059;
        --gold-light: #FFEebb;
        --gold-dark: #8e7037;
        --text-gray: #EAEAEA;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-gray);
        font-family: 'Montserrat', sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* Анимация золотого перелива */
    @keyframes menuShine {
        from { background-position: 0% center; }
        to { background-position: 200% center; }
    }

    /* Золотой текст (названия блюд) */
    .dish-title {
        font-family: 'Montserrat', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        background: linear-gradient(to right, #8e7037 0%, var(--gold) 40%, var(--gold-light) 50%, var(--gold) 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: menuShine 5s linear infinite;
        font-size: 13px;
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 6px;
    }

    /* Навигация */
    .nav-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 25px;
    }

    .nav-item {
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-size: 13px;
        color: #ffffff;
        padding: 5px 0;
        transition: all 0.3s ease;
        position: relative;
        cursor: pointer;
        opacity: 0.7;
    }

    .nav-item:hover, .nav-item.active {
        opacity: 1;
        color: var(--gold);
    }

    .nav-item::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1.5px;
        background-color: var(--gold);
        transition: width 0.3s ease;
    }

    .nav-item:hover::after, .nav-item.active::after {
        width: 100%;
    }

    /* Сетка и карточки */
    .menu-grid {
        display: grid;
        gap: 12px;
        width: 100%;
        padding: 0 5px;
    }

    @media (min-width: 768px) {
        .menu-grid { gap: 25px; padding: 0 15px; }
    }

    .dish-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .image-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--gold-dark);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: all 0.5s ease;
    }

    .image-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    .image-frame:hover img { transform: scale(1.1); }

    /* Кнопки */
    .action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 24px;
        border: 1px solid rgba(197, 160, 89, 0.3);
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 11px;
        text-decoration: none;
        transition: all 0.4s ease;
    }

    .button-gold-shimmer {
        background: linear-gradient(to right, #8e7037 0%, var(--gold) 40%, var(--gold-light) 50%, var(--gold) 60%, #8e7037 100%);
        background-size: 200% auto;
        color: white !important;
        animation: menuShine 4s linear infinite;
    }

    /* Элементы инфо */
    .dish-info { font-size: 13px; display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
    .price { color: #fff; font-weight: 500; }
    .weight { color: #999; font-size: 10px; }
    
    .details-trigger { font-size: 9px; text-transform: uppercase; color: var(--gold); cursor: pointer; margin-top: 5px; }
    .details-content { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; font-size: 11px; color: #999; }
    .details-content.open { max-height: 150px; opacity: 1; margin-top: 10px; }

    /* Лайтбокс */
    #lightbox {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); display: none; justify-content: center;
        align-items: center; z-index: 1000; backdrop-filter: blur(5px);
    }
    #lightbox-img { max-width: 90%; max-height: 80vh; border: 1px solid var(--gold); }
    .lightbox-close { position: fixed; top: 12px; right: 16px; z-index: 2001; width: 44px; height: 44px; border: none; background: transparent; color: #fff; font-size: 36px; line-height: 1; cursor: pointer; transition: color 0.2s; }
    .lightbox-close:hover { color: var(--gold); }
</style>
