    <div class="hero-bg">

    <script>
    
    const navbar = document.getElementById('navbar');
    const burgerBtn = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const body = document.body;
    const desktopZones = document.querySelectorAll('.desktop-nav-zone');

    const branches = {
        admiral: { name: "Адмиралтейская", slug: "admiralteyskaya", address: "Набережная реки Мойки д.67-69", addrMob: "Moyki 67-69" },
        udelnaya: { name: "Удельная", slug: "udelnaya", address: "Аккуратова д.13", addrMob: "Akkuratova 13" }
    };

    function updateBranchUI(id) {
        const data = branches[id];
        if (!data) return;

        // Используем опциональную проверку, чтобы скрипт не падал, если элемента нет на странице
        const elDesk = document.getElementById('current-branch-desk');
        const elMobName = document.getElementById('mob-branch-name');
        const elMobAddr = document.getElementById('mob-branch-addr');
        const elHeroDesk = document.getElementById('hero-branch-name-desk');
        const elMenuAddr = document.getElementById('menu-address-text');

        if (elDesk) elDesk.innerText = data.name;
        if (elMobName) elMobName.innerText = data.slug;
        if (elMobAddr) elMobAddr.innerText = data.addrMob;
        if (elHeroDesk) elHeroDesk.innerText = data.slug;
        if (elMenuAddr) elMenuAddr.innerText = data.address;

        document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.branch === id);
        });
    }

    function syncResponsiveNav() {
        if (!navbar) return;

        navbar.classList.remove('nav-compact');

        if (window.innerWidth <= 767) {
            navbar.classList.add('nav-compact');
            return;
        }

        const totalWidth = Array.from(desktopZones).reduce((sum, item) => {
            return sum + item.scrollWidth;
        }, 0);
        const navStyle = window.getComputedStyle(navbar);
        const navPadding =
            parseFloat(navStyle.paddingLeft || 0) +
            parseFloat(navStyle.paddingRight || 0);
        const availableWidth = navbar.clientWidth - navPadding;

        if (totalWidth + 18 > availableWidth) {
            navbar.classList.add('nav-compact');
        }
    }

    // Логика переключения филиалов
    document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            updateBranchUI(opt.dataset.branch);
            // Если это мобильное модальное окно, закрываем его после выбора
            const modal = document.getElementById('mobileBranchModal');
            if (modal) modal.classList.remove('active');
        });
    });

    // Открытие десктопного селектора
    const deskSelector = document.getElementById('desktopBranchSelector');
    if (deskSelector) {
        deskSelector.onclick = (e) => {
            e.currentTarget.classList.toggle('active');
            e.stopPropagation();
        };
    }

    // Мобильное модальное окно выбора филиала
    const mobTrigger = document.getElementById('mobileBranchTrigger');
    const closeBranch = document.getElementById('closeBranchModal');
    if (mobTrigger) mobTrigger.onclick = () => {
        const modal = document.getElementById('mobileBranchModal');
        if (modal) modal.classList.add('active');
    };
    if (closeBranch) closeBranch.onclick = () => {
        const modal = document.getElementById('mobileBranchModal');
        if (modal) modal.classList.remove('active');
    };

    window.onclick = () => {
        if (deskSelector) deskSelector.classList.remove('active');
    };

    // Скролл навигации
    let lastScrolled = false;
    let ticking = false;

    function onScroll() {
        const scrolled = window.scrollY > 30;
        if (scrolled !== lastScrolled) {
            lastScrolled = scrolled;
            if (navbar) navbar.classList.toggle('scrolled', scrolled);
        }
        ticking = false;
    }

    window.addEventListener('scroll', () => {
        if (!ticking) {
            ticking = true;
            requestAnimationFrame(onScroll);
        }
    }, { passive: true });

    syncResponsiveNav();
    window.addEventListener('resize', syncResponsiveNav, { passive: true });
    window.addEventListener('load', syncResponsiveNav);
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(syncResponsiveNav);
    }

    // УПРАВЛЕНИЕ МЕНЮ (ОСНОВНОЕ)
    if (burgerBtn && mobileMenu) {
        burgerBtn.onclick = () => {
            mobileMenu.classList.add('active');
            body.classList.add('menu-open');
        };
    }

    const closeBtn = document.getElementById('closeBtn');
    if (closeBtn && mobileMenu) {
        closeBtn.onclick = () => {
            mobileMenu.classList.remove('active');
            body.classList.remove('menu-open');
        };
    }
    
   document.querySelectorAll('.mobile-link').forEach(link => {
    link.onclick = function() {
        // 1. Ищем ВСЕ ссылки в мобильном меню, у которых может быть рамка
        // (и обычные активные, и ту, что пришла из CouchCMS как 'nav-booking-rect')
        const allLinks = document.querySelectorAll('.mobile-link');
        
        allLinks.forEach(l => {
            l.classList.remove('active-rect');
            l.classList.remove('nav-booking-rect'); // Удаляем оригинальный класс кнопки
        });
        
        // 2. Добавляем рамку только тому пункту, на который нажали
        this.classList.add('active-rect');

        // 3. Закрываем меню сразу, переход к разделу продолжится по ссылке
        if (mobileMenu) mobileMenu.classList.remove('active');
        body.classList.remove('menu-open');
    };
});

    // Золотая рамка в меню
    document.addEventListener('DOMContentLoaded', () => {
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.forEach(l => l.classList.remove('nav-booking-rect'));
                link.classList.add('nav-booking-rect');
            });
        });
    });
</script>
