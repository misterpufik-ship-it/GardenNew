<style>
    :root {
        --gold-main: #C5A059;
        --gold-dark: #8e7037;
        --gold-light: #FFEebb;
        --bg-black: #000000;
    }

    /* --- БАЗА --- */
    html, body { width: 100%; overflow-x: hidden; background: #000; margin: 0; }

    /* --- HERO ФОТО (ИСПРАВЛЕНО И ЗАФИКСИРОВАНО) --- */
    .hero-section {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Оригинальное выравнивание */
        align-items: center;
        padding: 110px 20px 40px 20px; /* Уменьшили верхний padding для центрирования лого */
        box-sizing: border-box;
        overflow: hidden;
    }

    .hero-bg { position: absolute; inset: 0; z-index: 1; }
    .hero-bg img { 
        position: absolute; inset: 0;
        width: 100%; height: 100%; 
        object-fit: cover; 
        opacity: 0.7; /* Фото видно четко */
    }
    .hero-overlay {
        position: absolute; inset: 0; z-index: 2;
        background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, transparent 70%, #000 100%);
    }

    /* --- АНИМАЦИИ --- */
    @keyframes glFadeInOnly { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes glLogoPulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.15); } }
   .logo-luxe-animate {
        opacity: 0;
        animation: glFadeInOnly 1.5s ease-out forwards, glLogoPulse 6s ease-in-out 1.5s infinite;
        will-change: transform, opacity;
        z-index: 10;
        display: block;
        margin-bottom: auto !important;
        /* Десктопная настройка: */
        transform: translateY(-25%) !important; 
    }

    .hero-section > .logo-luxe-animate {
        width: clamp(240px, 26vw, 340px) !important;
        max-width: min(68vw, 340px) !important;
        height: auto !important;
        margin-top: 0 !important;
    }

    /* ЖЕСТКАЯ КОРРЕКЦИЯ ДЛЯ МОБИЛЬНЫХ */
    @media (max-width: 767px) {
        .logo-luxe-animate {
            /* Отрицательный маржин тянет логотип вверх к навигации */
            margin-top: -1vh !important; 
            transform: translateY(0) !important;
            /* Увеличиваем размер для мобилок */
            width: 400px !important; 
        }
    }
    
    @keyframes goldShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .shimmer-text {
        background: linear-gradient(90deg, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        animation: goldShimmer 5s linear infinite;
        z-index: 10;
    }
/* Класс для активного пункта в мобильном меню */
.mobile-link.active-click {
    border: 1px solid rgba(197, 160, 89, 0.6) !important;
    background-color: rgba(197, 160, 89, 0.1) !important;
    color: #C5A059 !important;
}
    /* --- НАВИГАЦИЯ --- */

.gl-navbar {

    top: 0; 
    left: 0;

}

/* Состояние при прокрутке (черный фон) */
.gl-navbar.scrolled { 
    background: rgba(0, 0, 0, 0.95) !important; /* Черный фон с легкой прозрачностью */

    border-bottom: 1px solid rgba(197, 160, 89, 0.2) !important;

    padding-bottom: 5px !important; 
}
    
    .nav-link { position: relative; color: #ffffff !important; text-transform: uppercase; font-size: 11px; letter-spacing: 0.15em; font-weight: 500; transition: all 0.3s ease; padding: 8px 12px; text-decoration: none; border: 1px solid transparent; }

    .branch-dropdown { position: absolute; top: 100%; left: 0; min-width: 210px; background: rgba(0,0,0,0.9) !important; backdrop-filter: blur(10px); border: 1px solid var(--gold-main); display: none; flex-direction: column; z-index: 99; }

    <script>
    
    const navbar = document.getElementById('navbar');
    const burgerBtn = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const body = document.body;

    const branches = {
        admiral: { name: "Адмиралтейская", slug: "admiralteyskaya", address: "Набережная реки Мойки д.67-69", addrMob: "Moyki 67-69" },
        udelnaya: { name: "Удельная", slug: "udelnaya", address: "Аккуратова д.13", addrMob: "Akkuratova 13" }
    };

    function updateBranchUI(id) {
        const data = branches[id];
        if (!data) return;

        // Используем опциональную проверку, чтобы скрипт не падал, если элемента нет на странице
        const elDesk = document.getElementById('current-branch-desk');
        const elMobName = document.getElementById('mob-branch-name');
        const elMobAddr = document.getElementById('mob-branch-addr');
        const elHeroDesk = document.getElementById('hero-branch-name-desk');
        const elMenuAddr = document.getElementById('menu-address-text');

        if (elDesk) elDesk.innerText = data.name;
        if (elMobName) elMobName.innerText = data.slug;
        if (elMobAddr) elMobAddr.innerText = data.addrMob;
        if (elHeroDesk) elHeroDesk.innerText = data.slug;
        if (elMenuAddr) elMenuAddr.innerText = data.address;

        document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.branch === id);
        });
    }

    // Логика переключения филиалов
    document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            updateBranchUI(opt.dataset.branch);
            // Если это мобильное модальное окно, закрываем его после выбора
            const modal = document.getElementById('mobileBranchModal');
            if (modal) modal.classList.remove('active');
        });
    });

    // Открытие десктопного селектора
    const deskSelector = document.getElementById('desktopBranchSelector');
    if (deskSelector) {
        deskSelector.onclick = (e) => {
            e.currentTarget.classList.toggle('active');
            e.stopPropagation();
        };
    }

    // Мобильное модальное окно выбора филиала
    const mobTrigger = document.getElementById('mobileBranchTrigger');
    const closeBranch = document.getElementById('closeBranchModal');
    if (mobTrigger) mobTrigger.onclick = () => {
        const modal = document.getElementById('mobileBranchModal');
        if (modal) modal.classList.add('active');
    };
    if (closeBranch) closeBranch.onclick = () => {
        const modal = document.getElementById('mobileBranchModal');
        if (modal) modal.classList.remove('active');
    };

    window.onclick = () => {
        if (deskSelector) deskSelector.classList.remove('active');
    };

    // Скролл навигации
    let lastScrolled = false;
    let ticking = false;

    function onScroll() {
        const scrolled = window.scrollY > 30;
        if (scrolled !== lastScrolled) {
            lastScrolled = scrolled;
            if (navbar) navbar.classList.toggle('scrolled', scrolled);
        }
        ticking = false;
    }

    window.addEventListener('scroll', () => {
        if (!ticking) {
            ticking = true;
            requestAnimationFrame(onScroll);
        }
    }, { passive: true });

    // УПРАВЛЕНИЕ МЕНЮ (ОСНОВНОЕ)
    if (burgerBtn && mobileMenu) {
        burgerBtn.onclick = () => {
            mobileMenu.classList.add('active');
            body.classList.add('menu-open');
        };
    }

    const closeBtn = document.getElementById('closeBtn');
    if (closeBtn && mobileMenu) {
        closeBtn.onclick = () => {
            mobileMenu.classList.remove('active');
            body.classList.remove('menu-open');
        };
    }
    
   document.querySelectorAll('.mobile-link').forEach(link => {
    link.onclick = function() {
        // 1. Ищем ВСЕ ссылки в мобильном меню, у которых может быть рамка
        // (и обычные активные, и ту, что пришла из CouchCMS как 'nav-booking-rect')
        const allLinks = document.querySelectorAll('.mobile-link');
        
        allLinks.forEach(l => {
            l.classList.remove('active-rect');
            l.classList.remove('nav-booking-rect'); // Удаляем оригинальный класс кнопки
        });
        
        // 2. Добавляем рамку только тому пункту, на который нажали
        this.classList.add('active-rect');

        // 3. Закрываем меню сразу, переход к разделу продолжится по ссылке
        if (mobileMenu) mobileMenu.classList.remove('active');
        body.classList.remove('menu-open');
    };
});

    // Золотая рамка в меню
    document.addEventListener('DOMContentLoaded', () => {
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.forEach(l => l.classList.remove('nav-booking-rect'));
                link.classList.add('nav-booking-rect');
            });
        });
    });
</script>
