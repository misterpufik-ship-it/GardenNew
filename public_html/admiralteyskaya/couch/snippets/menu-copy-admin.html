<style>
.garden-copy-row-btn-wrap {
    position: absolute;
    top: 8px;
    right: 36px;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s ease;
}
.repeatable-region .row:hover .garden-copy-row-btn-wrap,
.repeatable-region .k_element_row:hover .garden-copy-row-btn-wrap,
table.repeatable tbody tr:hover .garden-copy-row-btn-wrap {
    opacity: 1;
    pointer-events: auto;
}
.garden-copy-row-btn {
    border: 1px solid #C5A059;
    background: #fff;
    color: #6b4f1d;
    font-size: 11px;
    line-height: 1;
    padding: 5px 8px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
}
.garden-copy-row-btn:hover {
    background: #C5A059;
    color: #fff;
}
.garden-copy-row-btn[disabled] {
    opacity: .6;
    cursor: wait;
}
</style>
<script>
(function() {
    if (!/\/couch\/admin\//.test(window.location.pathname)) {
        return;
    }

    var TARGET_BRANCH = '<cms:show branch_copy_to />';
    var TARGET_LABEL = '<cms:show branch_copy_to_label />';
    var API_URL = '/admiralteyskaya/api/menu-copy.php';
    var REPEATABLES = ['rep_hookahs_v2', 'rep_kitchen_v2', 'rep_bar_alc_v2', 'rep_bar_non_v2', 'list_promos_v2'];
    var FIELD_RE = /^f_(rep_[a-z0-9_]+|list_promos_v2)___(\d+)___([a-z0-9_]+)$/i;

    function toast(message, ok) {
        var el = document.getElementById('garden-copy-toast');
        if (!el) {
            el = document.createElement('div');
            el.id = 'garden-copy-toast';
            el.style.cssText = 'position:fixed;right:18px;bottom:18px;z-index:99999;padding:12px 16px;border-radius:4px;color:#fff;font:13px/1.4 sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:320px;';
            document.body.appendChild(el);
        }
        el.style.background = ok ? '#2e7d32' : '#b71c1c';
        el.textContent = message;
        clearTimeout(el._timer);
        el._timer = setTimeout(function() { el.remove(); }, 3500);
    }

    function collectRowData(rowEl) {
        var data = {};
        var repeatable = '';
        rowEl.querySelectorAll('input, select, textarea').forEach(function(input) {
            var name = input.getAttribute('name') || '';
            var match = name.match(FIELD_RE);
            if (!match) {
                return;
            }
            repeatable = match[1];
            var field = match[3];
            if (input.type === 'checkbox' || input.type === 'radio') {
                if (input.checked) {
                    data[field] = input.value;
                }
            } else {
                data[field] = input.value;
            }
        });
        return { repeatable: repeatable, row: data };
    }

    function findRowContainer(input) {
        var node = input;
        while (node && node !== document.body) {
            if (node.classList && (
                node.classList.contains('row') ||
                node.classList.contains('k_element_row') ||
                (node.tagName === 'TR' && node.parentElement && node.parentElement.tagName === 'TBODY')
            )) {
                return node;
            }
            node = node.parentElement;
        }
        return null;
    }

    function decorateRow(rowEl) {
        if (!rowEl || rowEl.dataset.gardenCopyReady === '1') {
            return;
        }

        var sample = rowEl.querySelector('input[name^="f_rep_"], input[name^="f_list_promos_v2"], select[name^="f_rep_"], select[name^="f_list_promos_v2"], textarea[name^="f_rep_"], textarea[name^="f_list_promos_v2"]');
        if (!sample) {
            return;
        }

        var match = (sample.getAttribute('name') || '').match(FIELD_RE);
        if (!match || REPEATABLES.indexOf(match[1]) === -1) {
            return;
        }

        rowEl.dataset.gardenCopyReady = '1';
        if (getComputedStyle(rowEl).position === 'static') {
            rowEl.style.position = 'relative';
        }

        var wrap = document.createElement('div');
        wrap.className = 'garden-copy-row-btn-wrap';
        wrap.title = 'Копировать во второй филиал (' + TARGET_LABEL + ')';

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'garden-copy-row-btn';
        btn.textContent = 'Копировать в ' + TARGET_LABEL;
        btn.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();

            var payload = collectRowData(rowEl);
            if (!payload.repeatable || !Object.keys(payload.row).length) {
                toast('Не удалось собрать данные строки.', false);
                return;
            }

            btn.disabled = true;
            fetch(API_URL, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    target_branch: TARGET_BRANCH,
                    repeatable: payload.repeatable,
                    row: payload.row
                })
            })
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                if (!result.ok || !result.data.ok) {
                    throw new Error((result.data && result.data.error) || 'Copy failed');
                }
                toast(result.data.message || 'Скопировано.', true);
            })
            .catch(function(err) {
                toast(err.message || 'Ошибка копирования.', false);
            })
            .finally(function() {
                btn.disabled = false;
            });
        });

        wrap.appendChild(btn);
        rowEl.appendChild(wrap);
    }

    function scanRepeatables() {
        document.querySelectorAll('input[name^="f_rep_"], input[name^="f_list_promos_v2"], select[name^="f_rep_"], select[name^="f_list_promos_v2"], textarea[name^="f_rep_"], textarea[name^="f_list_promos_v2"]').forEach(function(input) {
            var rowEl = findRowContainer(input);
            if (rowEl) {
                decorateRow(rowEl);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        scanRepeatables();
        var observer = new MutationObserver(function() {
            scanRepeatables();
        });
        observer.observe(document.body, { childList: true, subtree: true });
    });
})();
</script>
