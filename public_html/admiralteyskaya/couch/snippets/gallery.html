<!-- 2. СТИЛИ -->
<style>
    /* Обертка для изоляции стилей в Taplink */
    .garden-experience-widget {
        --bg-deep: #000000; /* Чисто черный фон */
        --text-main: #EAEAEA;
        --gold-matte: #C5A059;

        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
        background-color: var(--bg-deep) !important;
        color: var(--text-main);
        line-height: 1.5;

        /* ХАК ДЛЯ ВО ВСЮ ШИРИНУ В ТАПЛИНКЕ */
         width: 100%;
    position: relative;
    left: 0;
    right: 0;
    margin-left: 0;
    margin-right: 0;
    overflow-x: hidden; 
        z-index: 1;
    }

    .garden-experience-widget * { box-sizing: border-box; }

    .widget-limiter {
        max-width: 600px; 
        margin: 0 auto;
        width: 100%;
    }

    @media (min-width: 768px) {
        .widget-limiter { max-width: 1200px; }
    }

    .font-serif-lux { font-family: 'Cormorant Garamond', serif; }
    
    /* Специфические настройки для главного заголовка */
    .experience-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 30px;        /* Точно 30px */
        line-height: 36px;      /* Точно 36px */
        font-weight: 300;       /* Light */
        font-style: italic;     /* Курсив */
        color: #ffffff;
        margin: 0;
    }

    .no-scroll::-webkit-scrollbar { display: none; }
    
    /* Стили для золотой линии (Philosophy Style) */
    .philosophy-divider {
        width: 160px; 
        height: 1px;
        background: linear-gradient(to right, transparent, var(--gold-matte), transparent);
        margin: var(--gl-gold-gap, 12px) auto; 
        opacity: 0.8;
    }

    /* Анимация золотого перелива */
    .shimmer-gold {
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 5s linear infinite;
        display: inline-block;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        font-weight: 500;
    }

    @keyframes shine {
        to { background-position: 200% center; }
    }

    /* --- СЛАЙДЕР --- */
    .slider-snap-area {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-padding-left: 0.5rem;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none; 
        scroll-behavior: smooth;
    }
    
    .gallery-slide-item {
        flex: 0 0 auto;
        scroll-snap-align: start;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
        background: #111;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05); 
        transition: box-shadow 0.35s ease;
    }

    .gallery-slide-item::after {
        content: '';
        position: absolute;
        inset: 0;
        z-index: 3;
        background: rgba(0, 0, 0, 0);
        transition: background 0.35s ease;
        pointer-events: none;
    }

    .gallery-slide-item img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.35s ease, filter 0.35s ease;
    }

    .gallery-slide-hover-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.88);
        z-index: 4;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 1px solid rgba(197, 160, 89, 0.55);
        background: rgba(0, 0, 0, 0.62);
        color: #C5A059;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        backdrop-filter: blur(4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        transition: opacity 0.35s ease, transform 0.35s ease, background 0.35s ease, border-color 0.35s ease;
    }

    .gallery-svg-icon {
        width: 18px;
        height: 18px;
        display: block;
        flex-shrink: 0;
    }

    .slider-arrow .gallery-svg-icon,
    .widget-modal-arrow .gallery-svg-icon {
        width: 16px;
        height: 16px;
    }

    .widget-modal-close .gallery-svg-icon {
        width: 22px;
        height: 22px;
    }

    .gallery-slide-item:hover::after {
        background: rgba(0, 0, 0, 0.32);
    }

    .gallery-slide-item:hover img {
        transform: scale(1.05);
    }

    .gallery-slide-item:hover .gallery-slide-hover-icon {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        background: rgba(0, 0, 0, 0.72);
        border-color: #C5A059;
    }

    .gallery-slide-shade {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: linear-gradient(
            to top,
            rgba(0, 0, 0, 0.82) 0%,
            rgba(0, 0, 0, 0.35) 38%,
            transparent 68%
        );
    }

    .gallery-slide-caption {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 2;
        padding: 12px 14px 11px;
        max-width: 88%;
        pointer-events: none;
    }

    .gallery-slide-caption h3 {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 400;
        font-size: clamp(17px, 3.5vw, 22px);
        line-height: 1.2;
        margin: 0;
        letter-spacing: 0.02em;
        display: inline-block;
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 5s linear infinite;
        filter: drop-shadow(0 1px 5px rgba(0, 0, 0, 0.55));
    }

    @media (min-width: 768px) {
        .gallery-slide-caption {
            padding: 14px 16px 13px;
        }

        .gallery-slide-caption h3 {
            font-size: clamp(18px, 1.4vw, 23px);
        }
    }

    .ratio-1-1 { width: 75%; aspect-ratio: 1/1; }
    .ratio-3-2 { width: calc(75% * 1.5); aspect-ratio: 3/2; }

    @media (min-width: 768px) {
        .ratio-1-1 { width: calc(25% - 12px); }
        #tab-interior .ratio-3-2,
        #bf-tab-interior .ratio-3-2 { width: calc((25% - 12px) * 1.5); }
    }

    .slider-relative-box { position: relative; width: 100%; }
    
    .slider-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 40;
        color: #C5A059;
        background: rgba(0, 0, 0, 0.7); 
        backdrop-filter: blur(4px);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(197, 160, 89, 0.4);
        cursor: pointer;
        transition: all 0.3s;
    }
    .slider-arrow:hover { background: #C5A059; color: #000000; }
    .arrow-left { left: 8px; }
    .arrow-right { right: 8px; }

    .category-pane {
        display: none;
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    .category-pane.active {
        display: block;
        opacity: 1;
    }

    .tab-btn-link { 
        font-size: 10px; 
        text-transform: uppercase; 
        letter-spacing: 0.2em; 
        color: #666; 
        padding-bottom: 4px; 
        border-bottom: 1px solid transparent; 
        transition: 0.3s;
    }
    .tab-btn-link.active { 
        color: #C5A059; 
        border-bottom-color: #C5A059; 
    }

    .gallery-footer-note {
        margin-top: clamp(42px, 6vw, 82px) !important;
    }

    .widget-modal-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100001;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(197, 160, 89, 0.45);
        background: rgba(0, 0, 0, 0.58);
        color: #C5A059;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: color 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .widget-modal-arrow:hover,
    .widget-modal-arrow:focus,
    .widget-modal-arrow:active {
        background: #C5A059;
        color: #000000;
        border-color: #C5A059;
    }

    .widget-modal-frame {
        position: relative;
        width: auto;
        max-width: min(96vw, 1000px);
        transform: scale(0.95);
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .widget-modal-image-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        max-width: min(96vw, 1000px);
    }

    #widget-modal-img {
        display: block;
        width: auto;
        height: auto;
        max-width: min(92vw, 1000px);
        max-height: 75vh;
        object-fit: contain;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
    }

    #widget-modal-caption {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(22px, 3vw, 28px);
        color: #fff;
        font-style: italic;
        margin: 24px 0 0;
        text-align: center;
    }

    .widget-modal-close {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
        color: rgba(255, 255, 255, 0.75);
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(197, 160, 89, 0.35);
        border-radius: 50%;
        cursor: pointer;
        z-index: 100000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .widget-modal-close:hover {
        color: #000;
        background: #C5A059;
        border-color: #C5A059;
    }

    .widget-modal-arrow-prev { left: 10px; }
    .widget-modal-arrow-next { right: 10px; }

    @media (max-width: 767px) {
        .gallery-footer-note {
            margin-top: 34px !important;
        }

        .widget-modal-arrow {
            width: 40px;
            height: 40px;
        }

        .widget-modal-arrow-prev { left: 8px; }
        .widget-modal-arrow-next { right: 8px; }
    }
    
    .lock-scroll { overflow: hidden !important; }
</style>

<!-- 4. СКРИПТЫ -->
<script>
    function changeWidgetTab(tabId, btnElement) {
        document.querySelectorAll('.category-pane').forEach(el => {
            el.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn-link').forEach(btn => {
            btn.classList.remove('active');
        });
        
        const activeTab = document.getElementById(tabId);
        if(activeTab) activeTab.classList.add('active');
        if(btnElement) btnElement.classList.add('active');
    }

    function scrollWidgetSlider(sliderId, direction) {
        const slider = document.getElementById(sliderId);
        if (!slider) return;
        const items = slider.querySelectorAll('.gallery-slide-item');
        if (!items.length) return;

        const scrollLeft = slider.scrollLeft;
        const pad = parseFloat(getComputedStyle(slider).scrollPaddingLeft) || 0;
        let current = 0;
        for (let i = 0; i < items.length; i++) {
            if (items[i].offsetLeft <= scrollLeft + 3) current = i;
        }
        const targetIndex = Math.max(0, Math.min(items.length - 1, current + direction));
        slider.scrollTo({
            left: Math.max(0, items[targetIndex].offsetLeft - pad),
            behavior: 'smooth'
        });
    }

    let widgetModalItems = [];
    let widgetModalIndex = 0;
    let widgetModalScrollY = 0;

    function renderWidgetModalItem() {
        const item = widgetModalItems[widgetModalIndex];
        if (!item) return;

        const img = item.querySelector('img');
        const title = item.querySelector('h3');
        const modalImg = document.getElementById('widget-modal-img');

        if (img) {
            modalImg.src = img.currentSrc || img.src;
            modalImg.alt = img.alt || (title ? title.innerText : '');
            modalImg.removeAttribute('width');
            modalImg.removeAttribute('height');
            modalImg.style.width = '';
            modalImg.style.height = '';
        } else {
            modalImg.removeAttribute('src');
        }

        document.getElementById('widget-modal-caption').innerText = title ? title.innerText : '';
    }

    function lockWidgetPageScroll() {
        widgetModalScrollY = window.scrollY || window.pageYOffset || 0;
        document.body.classList.add('lock-scroll');
        document.body.style.position = 'fixed';
        document.body.style.top = `-${widgetModalScrollY}px`;
        document.body.style.left = '0';
        document.body.style.right = '0';
        document.body.style.width = '100%';
    }

    function unlockWidgetPageScroll() {
        document.body.classList.remove('lock-scroll');
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.left = '';
        document.body.style.right = '';
        document.body.style.width = '';
        window.scrollTo(0, widgetModalScrollY);
    }

    function openWidgetModal(element) {
        const modal = document.getElementById('widget-image-modal');
        const activePane = element.closest('.category-pane');

        widgetModalItems = Array.from((activePane || document).querySelectorAll('.gallery-slide-item'));
        widgetModalIndex = Math.max(0, widgetModalItems.indexOf(element));
        renderWidgetModalItem();

        lockWidgetPageScroll();
        modal.style.display = 'flex';
        
        setTimeout(() => {
            modal.style.opacity = '1';
            const frame = modal.querySelector('.widget-modal-frame');
            if (frame) frame.style.transform = 'scale(1)';
        }, 10);
    }

    function shiftWidgetModal(step) {
        if (!widgetModalItems.length) return;
        widgetModalIndex = (widgetModalIndex + step + widgetModalItems.length) % widgetModalItems.length;
        renderWidgetModalItem();
    }

    function closeWidgetModal() {
        const modal = document.getElementById('widget-image-modal');
        modal.style.opacity = '0';
        const frame = modal.querySelector('.widget-modal-frame');
        if (frame) frame.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
            modal.style.display = 'none';
            unlockWidgetPageScroll();
        }, 300);
    }

    window.changeWidgetTab = changeWidgetTab;
    window.scrollWidgetSlider = scrollWidgetSlider;
    window.openWidgetModal = openWidgetModal;
    window.closeWidgetModal = closeWidgetModal;
    window.shiftWidgetModal = shiftWidgetModal;

    document.querySelectorAll('.gallery-slide-item').forEach((item) => {
        if (item.querySelector('.gallery-slide-hover-icon')) return;
        const icon = document.createElement('span');
        icon.className = 'gallery-slide-hover-icon';
        icon.setAttribute('aria-hidden', 'true');
        icon.innerHTML = '<svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
        item.appendChild(icon);
    });
</script>
