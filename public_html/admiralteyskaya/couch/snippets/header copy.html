<style>
    :root {
        --gold-main: #C5A059;
        --gold-dark: #8e7037;
        --gold-light: #FFEebb;
        --bg-black: #000000;
    }

    /* --- АНИМАЦИИ --- */
    @keyframes glFadeInOnly {
        0% { opacity: 0; transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1); }
    }

    @keyframes glLogoPulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.05); filter: brightness(1.15); }
    }

    .logo-luxe-animate {
        opacity: 0;
        animation: 
            glFadeInOnly 1.5s ease-out forwards,
            glLogoPulse 6s ease-in-out 1.5s infinite;
        will-change: transform, opacity, filter;
    }
@media (max-width: 767px){
  .logo-luxe-animate{ margin-top: -20px; }
}

    
    @keyframes goldShimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
    }

    .shimmer-text {
        background: linear-gradient(90deg, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: goldShimmer 5s linear infinite;
    }

    .tagline-premium {
        font-size: 12px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.15));
        display: inline-block;
        text-align: center;
    }

    /* НАВИГАЦИЯ */
    .gl-navbar{
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  z-index: 9999;

  /* единый источник правды по высоте */
  padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;

  background: transparent;
  transition: background-color .25s ease, border-color .25s ease;
}
.gl-navbar.scrolled{
  background: rgba(0,0,0,0.95);
  border-bottom: 1px solid rgba(197,160,89,0.2);
}

    
    .nav-link {
        position: relative;
        color: #ffffff !important;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.15em;
        font-weight: 500;
        transition: all 0.3s ease;
        padding: 8px 12px;
        text-decoration: none;
        border: 1px solid transparent;
    }

    .nav-link:hover { color: var(--gold-main) !important; }

    .nav-booking-rect {
        border: 1px solid rgba(197, 160, 89, 0.6) !important;
        background-color: rgba(197, 160, 89, 0.1) !important;
        color: var(--gold-main) !important;
    }

    .nav-link:not(.nav-booking-rect)::after {
        content: '';
        position: absolute;
        bottom: 4px; left: 50%; width: 0; height: 1px;
        background-color: var(--gold-main);
        transition: all 0.3s ease;
        transform: translateX(-50%);
    }
    .nav-link:not(.nav-booking-rect):hover::after { width: 50%; }

    /* ВЫБОР ФИЛИАЛА */
    .branch-selector { position: relative; cursor: pointer; padding: 8px 16px; margin-right: 15px; transition: all 0.3s ease; background: transparent !important; z-index: 100; }
    .branch-dropdown {
        position: absolute; top: 100%; left: 0; min-width: 210px;
        background: rgba(0,0,0,0.9) !important; backdrop-filter: blur(10px);
        border: 1px solid var(--gold-main); display: none; flex-direction: column; z-index: 99;
    }
    .branch-selector.active .branch-dropdown { display: flex; }
    .branch-option { padding: 16px 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; color: rgba(255,255,255,0.7); }
    .branch-option:hover { background: rgba(197, 160, 89, 0.15); color: var(--gold-main); }
    .branch-option.active { color: var(--gold-main); font-weight: 700; }

    /* МОБИЛЬНОЕ МЕНЮ */
    .mobile-menu-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; 
        background-color: #080808; z-index: 1000000;
        transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        display: flex; flex-direction: column; align-items: center; visibility: hidden;
    }
    .mobile-menu-overlay.active { transform: translateY(0); visibility: visible; }

    .mobile-branch-modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
        z-index: 1000001; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    }
    .mobile-branch-modal.active { display: flex; }

    .mobile-link {
        font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #ffffff !important;
        margin: 6px 0; opacity: 0; transform: translateY(20px); transition: all 0.3s ease;
        text-decoration: none; letter-spacing: 0.05em; border: 1px solid transparent; padding: 4px 24px;
    }
    .mobile-link.active-rect { border-color: rgba(197, 160, 89, 0.6) !important; background-color: rgba(197, 160, 89, 0.1) !important; color: var(--gold-main) !important; }
    .mobile-menu-overlay.active .mobile-link { opacity: 1; transform: translateY(0); }

    /* HERO */
    .hero-section {
        
         min-height: 100svh;      /* стабильная высота на мобилке */
  height: auto;            /* НЕ фиксируем 100dvh */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: calc(100px + env(safe-area-inset-top)) 20px 100px 20px;
  overflow: hidden;
    }
 /* HERO background — без анимации, стабильно на мобилке */

.hero-bg {
    position: absolute;
    inset: 0;
    z-index: -1;
    background-color: #000;
    overflow: hidden; /* критично, чтобы ничего не вылезало */
}

.hero-bg img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;

    /* АНИМАЦИЯ ПОЛНОСТЬЮ ВЫКЛЮЧЕНА */
    animation: none !important;
    transform: none !important;
    will-change: auto;
}

.hero-overlay {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.4) 0%,
        transparent 40%,
        transparent 70%,
        rgba(0,0,0,0.9) 100%
    );
}

    .gold-line-thin { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-main), transparent); opacity: 0.6; }

    body.menu-open { overflow: hidden !important; }
    /* --- FIX: убираем blur на мобилке --- */
@media (max-width: 767px) {
    .gl-navbar.scrolled {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }
    .hero-bg img{
    animation: none !important;  /* мобилка без zoom */
    transform: none !important;
  }
}

/* --- Десктоп: blur можно оставить --- */
@media (min-width: 768px) {
    .gl-navbar.scrolled {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
}

</style>

<script>
    const navbar = document.getElementById('navbar');
    const burgerBtn = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const body = document.body;

    const branches = {
        admiral: { name: "Адмиралтейская", slug: "admiralteyskaya", address: "Набережная реки Мойки д.67-69", addrMob: "Moyki 67-69" },
        udelnaya: { name: "Удельная", slug: "udelnaya", address: "Аккуратова д.13", addrMob: "Akkuratova 13" }
    };

    function updateBranchUI(id) {
        const data = branches[id];
        document.getElementById('current-branch-desk').innerText = data.name;
        document.getElementById('mob-branch-name').innerText = data.slug;
        document.getElementById('mob-branch-addr').innerText = data.addrMob;
        document.getElementById('hero-branch-name-desk').innerText = data.slug;
        document.getElementById('menu-address-text').innerText = data.address;
        document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.branch === id);
        });
    }

    // Логика переключения
    document.querySelectorAll('.branch-option, .mobile-branch-opt').forEach(opt => {
        opt.addEventListener('click', () => updateBranchUI(opt.dataset.branch));
    });

    document.getElementById('desktopBranchSelector').onclick = (e) => {
        e.currentTarget.classList.toggle('active');
        e.stopPropagation();
    };

    document.getElementById('mobileBranchTrigger').onclick = () => document.getElementById('mobileBranchModal').classList.add('active');
    document.getElementById('closeBranchModal').onclick = () => document.getElementById('mobileBranchModal').classList.remove('active');

    window.onclick = () => document.getElementById('desktopBranchSelector').classList.remove('active');

    let lastScrolled = false;
let ticking = false;

function onScroll() {
    const scrolled = window.scrollY > 30;

    if (scrolled !== lastScrolled) {
        lastScrolled = scrolled;
        navbar.classList.toggle('scrolled', scrolled);
    }
    ticking = false;
}

window.addEventListener('scroll', () => {
    if (!ticking) {
        ticking = true;
        requestAnimationFrame(onScroll);
    }
}, { passive: true });


    burgerBtn.onclick = () => { mobileMenu.classList.add('active'); body.classList.add('menu-open'); };
    document.getElementById('closeBtn').onclick = () => { mobileMenu.classList.remove('active'); body.classList.remove('menu-open'); };
    
    document.querySelectorAll('.mobile-link').forEach(link => {
        link.onclick = () => { mobileMenu.classList.remove('active'); body.classList.remove('menu-open'); };
    });
 
document.addEventListener('DOMContentLoaded', () => {
  const navLinks = document.querySelectorAll('.nav-link');

  navLinks.forEach(link => {
    link.addEventListener('click', () => {
      // снимаем золотую рамку со всех
      navLinks.forEach(l => l.classList.remove('nav-booking-rect'));

      // вешаем на нажатую
      link.classList.add('nav-booking-rect');
    });
  });
});

</script>
