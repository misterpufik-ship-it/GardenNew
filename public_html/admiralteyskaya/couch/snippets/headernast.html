ÔĽŅ<style>
    :root {
        --gold-main: #C5A059;
        --gold-dark: #8e7037;
        --gold-light: #FFEebb;
        --bg-black: #000000;
    }

    /* --- –†—í–†—ú–†¬ė–†—ö–†—í–†¬¶–†¬ė–†¬ė --- */
    @keyframes glFadeInOnly {
        0% { opacity: 0; transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1); }
    }
    @keyframes glLogoPulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.05); filter: brightness(1.15); }
    }
    .logo-luxe-animate {
        opacity: 0;
        animation: glFadeInOnly 1.5s ease-out forwards, glLogoPulse 6s ease-in-out 1.5s infinite;
    }
    @keyframes goldShimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
    }
    .shimmer-text {
        background: linear-gradient(90deg, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: goldShimmer 5s linear infinite;
    }

    /* –†—ú–†—í–†‚Äô–†¬ė–†‚Äú–†—í–†¬¶–†¬ė–†–á */
    .gl-navbar {
        position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;
        transition: all 0.4s ease; background: transparent;
    }
    .gl-navbar.scrolled {
        background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding: 5px 0;
    }

    .nav-link {
        position: relative; color: #ffffff !important; text-transform: uppercase;
        font-size: 11px; letter-spacing: 0.15em; font-weight: 500;
        transition: all 0.3s ease; padding: 8px 16px; text-decoration: none;
        border: 1px solid transparent; display: inline-block;
    }

    /* –†—ě–†—õ–†—ě –†–é–†—í–†—ö–†¬ę–†‚ĄĘ –†‚ÄĒ–†—õ–†‚Äļ–†—õ–†—ě–†—õ–†‚ĄĘ –†—ü–†¬†–†–á–†—ö–†—õ–†–ą–†‚Äú–†—õ–†‚Äļ–†¬¨–†—ú–†¬ė–†—ô */
    .nav-link.active-rect {
        border: 1px solid rgba(197, 160, 89, 0.6) !important;
        background-color: rgba(197, 160, 89, 0.1) !important;
        color: var(--gold-main) !important;
    }

    /* –†‚Äô–†¬ę–†‚Äė–†—õ–†¬† –†¬§–†¬ė–†‚Äļ–†¬ė–†—í–†‚Äļ–†—í */
    .branch-selector { position: relative; cursor: pointer; padding: 8px 16px; margin-right: 15px; z-index: 100; }
    .branch-dropdown {
        position: absolute; top: 100%; left: 0; min-width: 210px;
        background: rgba(8,8,8,0.95) !important; backdrop-filter: blur(10px);
        border: 1px solid var(--gold-main); display: none; flex-direction: column;
    }
    .branch-selector.active .branch-dropdown { display: flex; }
    .branch-option { padding: 16px 20px; font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,0.7); cursor: pointer; }
    .branch-option:hover { background: rgba(197, 160, 89, 0.1); color: var(--gold-main); }
    .branch-option.active { color: var(--gold-main); font-weight: 700; }

    /* –†—ö–†—õ–†‚Äė–†¬ė–†‚Äļ–†¬¨–†—ú–†—õ–†‚ÄĘ –†—ö–†‚ÄĘ–†—ú–†¬ģ */
    .mobile-menu-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
        background-color: #080808; z-index: 1000000;
        transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        display: flex; flex-direction: column; align-items: center; visibility: hidden;
    }
    .mobile-menu-overlay.active { transform: translateY(0); visibility: visible; }
    .mobile-link {
        font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #ffffff !important;
        margin: 8px 0; text-decoration: none; padding: 6px 30px; border: 1px solid transparent;
        transition: 0.3s;
    }
    .mobile-link.active-rect { border-color: rgba(197, 160, 89, 0.6); background: rgba(197, 160, 89, 0.1); color: var(--gold-main) !important; }

    /* HERO */
    .hero-section {
        height: 100vh; height: 100dvh; width: 100%; position: relative;
        display: flex; flex-direction: column; justify-content: space-between;
        align-items: center; padding: 120px 20px 40px 20px; overflow: hidden;
    }
    .hero-bg img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, #000 100%); }

    body.menu-open { overflow: hidden !important; }
</style>

<nav class="gl-navbar flex justify-between items-center px-6 py-6 md:px-8" id="navbar">
    <div class="hidden md:flex gap-4 items-center flex-1">
        <a href="<cms:show link_vk />" target="_blank" class="text-white hover:text-[#C5A059]"><i class="fab fa-vk text-lg"></i></a>
        <a href="<cms:show link_inst />" target="_blank" class="text-white hover:text-[#C5A059]"><i class="fab fa-instagram text-lg"></i></a>
    </div>

    <div class="hidden md:flex items-center gap-2">
        <div class="branch-selector" id="desktopBranchSelector">
            <div class="flex items-center gap-2">
                <i class="fas fa-location-dot text-[#C5A059]"></i>
                <span id="current-branch-desk" class="text-[10px] uppercase font-bold text-[#C5A059]">–†—í–†“Ď–†—ė–†—Ď–°–ā–†¬į–†¬Ľ–°‚Äö–†¬Ķ–†‚ĄĖ–°–É–†—Ē–†¬į–°–Ź</span>
                <i class="fas fa-chevron-down text-[8px] opacity-50"></i>
            </div>
            <div class="branch-dropdown">
                <div class="branch-option active" data-branch="admiral">–†—í–†“Ď–†—ė–†—Ď–°–ā–†¬į–†¬Ľ–°‚Äö–†¬Ķ–†‚ĄĖ–°–É–†—Ē–†¬į–°–Ź</div>
                <div class="branch-option" data-branch="udelnaya">–†–ą–†“Ď–†¬Ķ–†¬Ľ–°–ä–†–Ö–†¬į–°–Ź</div>
            </div>
        </div>

        <div class="flex items-center gap-1" id="mainNavLinks">
            <cms:show_repeatable 'nav_menu'>
                <a href="<cms:show item_link />" class="nav-link <cms:if is_button>active-rect</cms:if>">
                    <cms:show item_name />
                </a>
            </cms:show_repeatable>
        </div>
    </div>

    <div class="hidden md:flex gap-6 items-center justify-end flex-1">
        <a href="tel:<cms:show header_phone_link />" class="text-white hover:text-[#C5A059] text-[10px] font-semibold uppercase">Call <i class="fas fa-phone-alt ml-1"></i></a>
    </div>

    <div class="md:hidden flex items-center justify-between w-full relative">
        <a href="tel:<cms:show header_phone_link />" class="text-[#C5A059]"><i class="fas fa-phone-alt text-xl"></i></a>

        <div class="text-center cursor-pointer" id="mobileBranchTrigger">
             <p id="mob-branch-name" class="text-[13px] uppercase font-bold text-[#C5A059] m-0">admiralteyskaya</p>
             <p class="text-[9px] text-white/50 m-0">Moyki 67-69 <i class="fas fa-chevron-down text-[7px]"></i></p>
        </div>

        <div class="burger-btn text-[#C5A059]" id="burgerBtn"><i class="fas fa-bars text-2xl"></i></div>
    </div>
</nav>

<div class="mobile-menu-overlay" id="mobileMenu">
    <div class="w-full flex justify-center items-center px-6 pt-6 z-10 relative">
        <a href="#home" onclick="closeMenu()">
            <img src="/couch/uploads/image/logo3.webp" class="h-28 w-auto" alt="Logo">
        </a>
        <div class="cursor-pointer text-[#C5A059] p-2 absolute top-6 right-6" id="closeBtn">
            <i class="fas fa-times text-3xl"></i>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center flex-1 w-full" id="mobileNavLinks">
        <cms:show_repeatable 'nav_menu'>
            <a href="<cms:show item_link />" class="mobile-link <cms:if is_button>active-rect</cms:if>">
                <cms:show item_name />
            </a>
        </cms:show_repeatable>
    </div>
</div>

<header class="hero-section" id="home">
    <div class="hero-bg">
        <img src="<cms:show hero_bg_desk />" alt="Interior">
        <div class="hero-overlay"></div>
    </div>
    <img src="/couch/uploads/image/logo3.webp" alt="Logo" class="w-72 md:w-96 logo-luxe-animate z-10">
    <div class="z-10 text-center px-4">
        <p class="tagline-premium shimmer-text mb-6"><cms:show hero_tagline /></p>
        <div class="hidden md:flex items-center justify-center gap-4">
            <div class="gold-line-thin"></div>
            <p id="hero-branch-name-desk" class="text-[14px] uppercase tracking-[0.5em] text-[#C5A059]">admiralteyskaya</p>
            <div class="gold-line-thin"></div>
        </div>
    </div>
</header>

<script>
    const navbar = document.getElementById('navbar');
    const burgerBtn = document.getElementById('burgerBtn');
    const closeBtn = document.getElementById('closeBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const body = document.body;

    // --- –†‚Äļ–†—õ–†‚Äú–†¬ė–†—ô–†—í –†—ü–†‚ÄĘ–†¬†–†‚ÄĘ–†—ö–†‚ÄĘ–†¬©–†‚ÄĘ–†—ú–†¬ė–†–á –†—ü–†¬†–†–á–†—ö–†—õ–†–ą–†‚Äú–†—õ–†‚Äļ–†¬¨–†—ú–†¬ė–†—ô–†—í ---
    function setupNav(containerId, activeClass) {
        const links = document.querySelectorAll(`${containerId} a`);
        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove(activeClass));
                this.classList.add(activeClass);
                if(mobileMenu.classList.contains('active')) closeMenu();
            });
        });
    }

    // –†‚ÄĒ–†¬į–†—ó–°—ď–°–É–†—Ē–†¬į–†¬Ķ–†—ė –†“Ď–†¬Ľ–°–Ź –†“Ď–†¬Ķ–°–É–†—Ē–°‚Äö–†—ē–†—ó–†¬į –†—Ď –†—ė–†—ē–†¬Ī–†—Ď–†¬Ľ–†—Ē–†—Ď
    setupNav('#mainNavLinks', 'active-rect');
    setupNav('#mobileNavLinks', 'active-rect');

    // –†—õ–°–É–°‚Äö–†¬į–†¬Ľ–°–ä–†–Ö–†—ē–†‚ĄĖ –°‚Äě–°—ď–†–Ö–†—Ē–°‚Ä†–†—Ď–†—ē–†–Ö–†¬į–†¬Ľ
    window.onscroll = () => window.scrollY > 30 ? navbar.classList.add('scrolled') : navbar.classList.remove('scrolled');

    burgerBtn.onclick = () => { mobileMenu.classList.add('active'); body.classList.add('menu-open'); };
    closeBtn.onclick = closeMenu;

    function closeMenu() {
        mobileMenu.classList.remove('active');
        body.classList.remove('menu-open');
    }

    // –†¬§–†—Ď–†¬Ľ–†—Ď–†¬į–†¬Ľ–°‚ÄĻ
    document.getElementById('desktopBranchSelector').onclick = (e) => {
        e.currentTarget.classList.toggle('active');
        e.stopPropagation();
    };

    window.onclick = () => document.getElementById('desktopBranchSelector').classList.remove('active');
</script>
