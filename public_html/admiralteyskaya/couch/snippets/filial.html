<style>
    /* Изоляция контейнера на всю ширину */
    .branch-section-container {
        margin: 0; 
        padding: 0; 
        background-color: #000000;
        width: 100%;
    position: relative;
    left: 0;
    right: 0;
    margin-left: 0;
    margin-right: 0;
    overflow: hidden;
    }

    .branch-wrapper {
        --bg-deep: #000000; --text-main: #EAEAEA; --gold-matte: #C5A059;
        position: relative; width: 100%; min-height: 600px;
        display: flex; align-items: center; justify-content: center;
        background-color: var(--bg-deep); color: var(--text-main);
        font-family: 'Montserrat', sans-serif; padding: 64px 18px 70px;
    }
    
    @media (min-width: 640px) { .branch-wrapper { padding: 76px 20px 86px; } }

    .content-limiter {
        max-width: 680px; margin: 0 auto; width: 100%;
        position: relative; z-index: 10; text-align: center;
    }

    /* Заголовок */
    .title-branch {
        font-family: 'Cormorant Garamond', serif; font-size: 30px;
        line-height: 1.2; font-weight: 300; font-style: italic;
        color: #ffffff; margin: 0;
    }

    .gold-line {
        width: 160px; height: 1px; margin: 16px auto; opacity: 0.8;
        background: linear-gradient(to right, transparent, #C5A059, transparent);
    }

    /* Анимация золотого перелива */
    @keyframes shineGold {
        to { background-position: 200% center; }
    }

    .subtitle-gold {
        font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.4em; margin: 0;
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
        color: transparent; animation: shineGold 5s linear infinite;
        display: inline-block;
    }

    .branch-address-wrap {
        width: min(100%, 560px);
        margin: 0 auto;
        padding: 0 12px;
        border: 0;
        background: transparent;
        text-align: center;
    }

    .branch-address-text {
        font-family: 'Cormorant Garamond', serif !important;
        font-size: clamp(21px, 4.8vw, 30px) !important;
        line-height: 1.24 !important;
        font-weight: 300 !important;
        font-style: italic !important;
        color: #ffffff !important;
        letter-spacing: 0 !important;
        text-transform: none !important;
        margin: 0 !important;
        overflow-wrap: anywhere;
    }

    .branch-metro-text {
        font-family: 'Montserrat', sans-serif !important;
        font-size: clamp(8px, 2.4vw, 11px) !important;
        line-height: 1.6 !important;
        letter-spacing: clamp(0.12em, 0.7vw, 0.22em) !important;
        color: rgba(255,255,255,0.52) !important;
        text-transform: uppercase !important;
        margin: 8px 0 0 !important;
        overflow-wrap: anywhere;
    }

    /* Стили изображения */
    .img-frame {
        position: relative; margin: 30px auto 24px; width: 100%; max-width: 520px; padding: 1px;
        background: linear-gradient(45deg, rgba(197,160,89,0.3), transparent, rgba(197,160,89,0.3));
        overflow: hidden;
    }
    
    @media (min-width: 640px) { .img-frame { margin: 36px auto 28px; } }

    .img-premium {
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: cover;
        display: block;
        filter: brightness(0.9);
    }

    .branch-gallery-track {
        display: flex;
        transition: transform 0.45s ease;
        will-change: transform;
    }

    .branch-gallery-slide {
        flex: 0 0 100%;
        width: 100%;
    }

    .branch-gallery-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 38px;
        height: 38px;
        border: 1px solid rgba(197, 160, 89, 0.45);
        background: rgba(0,0,0,0.44);
        color: #C5A059;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        cursor: pointer;
        transition: background 0.25s ease, color 0.25s ease;
    }

    .branch-gallery-btn:hover {
        background: rgba(197, 160, 89, 0.18);
        color: #ffffff;
    }

    .branch-gallery-prev { left: 12px; }
    .branch-gallery-next { right: 12px; }

    .branch-gallery-dots {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 12px;
        display: flex;
        justify-content: center;
        gap: 7px;
        z-index: 3;
    }

    .branch-gallery-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255,255,255,0.35);
        border: 0;
        padding: 0;
    }

    .branch-gallery-dot.active {
        background: #C5A059;
    }

    /* Кнопка с переливом */
    .btn-action {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: min(100%, 300px); padding: 18px 28px; border: none;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em;
        text-decoration: none; transition: transform 0.35s ease, box-shadow 0.35s ease, filter 0.35s ease; margin-top: 26px;
        position: relative; font-weight: 800;
        background: linear-gradient(135deg, #8e7037, #C5A059, #FFEebb, #C5A059);
        color: #000000 !important; animation: none; box-shadow: 0 12px 34px rgba(0, 0, 0, 0.42);
    }

    .btn-action:hover { transform: translateY(-2px); filter: brightness(1.06); box-shadow: 0 16px 42px rgba(0, 0, 0, 0.52); }

    .film-grain {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04; pointer-events: none; z-index: 1;
    }

    .separator-img { max-width: 256px; width: 100%; height: auto; opacity: 0.9; margin: 40px auto 0; }

    @media (max-width: 767px) {
        .branch-wrapper { padding: 52px 16px 62px; }
        .title-branch { font-size: 30px; }
        .subtitle-gold { font-size: 10px; letter-spacing: 0.28em; line-height: 1.8; }
        .branch-address-wrap { padding: 0 6px; }
        .btn-action { min-width: min(100%, 280px); font-size: 10px; padding: 17px 22px; }
        .separator-img { max-width: 220px; margin-top: 34px; }
        .img-premium { aspect-ratio: 4 / 3; }
        .branch-gallery-btn { width: 34px; height: 34px; }
    }
</style>

<div class="branch-section-container">
    <div class="branch-wrapper">
        <div class="film-grain"></div>

        <div class="content-limiter">
            <div class="fade-up">
                <h2 class="title-branch"><cms:show final_title /></h2>
            </div>

            <div class="fade-up" style="animation-delay: 0.2s;">
                <div class="gold-line"></div>
            </div>

            <div class="fade-up" style="animation-delay: 0.3s;">
                <p class="subtitle-gold"><cms:show final_subtitle /></p>
            </div>
            
            <div class="fade-up" style="animation-delay: 0.5s;">
                <div class="img-frame branch-gallery" data-branch-gallery>
                    <div class="branch-gallery-track">
                        <div class="branch-gallery-slide">
                            <img src="<cms:show final_img />" alt="<cms:if final_img_alt><cms:show final_img_alt /><cms:else /><cms:show final_title /></cms:if>" class="img-premium" loading="lazy" decoding="async">
                        </div>
                        <cms:show_repeatable 'final_gallery'>
                            <cms:if final_gallery_img>
                                <div class="branch-gallery-slide">
                                    <img src="<cms:show final_gallery_img />" alt="<cms:show final_gallery_alt />" class="img-premium" loading="lazy" decoding="async">
                                </div>
                            </cms:if>
                        </cms:show_repeatable>
                    </div>
                    <button type="button" class="branch-gallery-btn branch-gallery-prev" aria-label="Previous photo"><i class="fas fa-chevron-left"></i></button>
                    <button type="button" class="branch-gallery-btn branch-gallery-next" aria-label="Next photo"><i class="fas fa-chevron-right"></i></button>
                    <div class="branch-gallery-dots" aria-hidden="true"></div>
                </div>
                
                <div class="branch-address-wrap">
                    <p class="branch-address-text">
                        <cms:show final_address />
                    </p>
                    <p class="branch-metro-text">
                        <cms:show final_metro />
                    </p>
                </div>

                <a href="<cms:show final_btn_link />" class="btn-action">
                    <cms:show final_btn_text />
                </a>

                <div class="flex justify-center">
                    <img src="<cms:if final_sep='https://misterpufik.ru/div.png'>couch/uploads/image/div.webp<cms:else /><cms:show final_sep /></cms:if>" alt="Separator" class="separator-img" loading="lazy" decoding="async">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('[data-branch-gallery]').forEach((gallery) => {
        const track = gallery.querySelector('.branch-gallery-track');
        const slides = Array.from(gallery.querySelectorAll('.branch-gallery-slide'));
        const prev = gallery.querySelector('.branch-gallery-prev');
        const next = gallery.querySelector('.branch-gallery-next');
        const dotsWrap = gallery.querySelector('.branch-gallery-dots');
        let index = 0;

        if (!track || slides.length < 2) {
            if (prev) prev.style.display = 'none';
            if (next) next.style.display = 'none';
            if (dotsWrap) dotsWrap.style.display = 'none';
            return;
        }

        slides.forEach((_, dotIndex) => {
            const dot = document.createElement('button');
            dot.type = 'button';
            dot.className = 'branch-gallery-dot';
            dot.addEventListener('click', () => show(dotIndex));
            dotsWrap.appendChild(dot);
        });

        const dots = Array.from(dotsWrap.querySelectorAll('.branch-gallery-dot'));

        function show(nextIndex) {
            index = (nextIndex + slides.length) % slides.length;
            track.style.transform = `translateX(${-index * 100}%)`;
            dots.forEach((dot, dotIndex) => dot.classList.toggle('active', dotIndex === index));
        }

        prev.addEventListener('click', () => show(index - 1));
        next.addEventListener('click', () => show(index + 1));
        show(0);
    });
</script>
