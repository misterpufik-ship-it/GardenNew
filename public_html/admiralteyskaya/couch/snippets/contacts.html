<style>
    #contact.gl_full_width_bg {
        background: #000;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    #contact .gl_tp_body_wrapper {
        width: min(100%, 1200px);
        margin: 0 auto;
        padding: 56px 20px 64px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    #contact .gl_tp_main_title {
        font-family: 'Cormorant Garamond', serif !important;
        font-size: 30px !important;
        line-height: 36px !important;
        font-weight: 300 !important;
        font-style: italic !important;
        color: #ffffff !important;
        margin: 0 !important;
        text-align: center !important;
    }

    #contact .gl_tp_hr_top,
    #contact .gl_tp_hr_gold {
        width: 160px;
        height: 1px;
        margin: 16px auto;
        background: linear-gradient(to right, transparent, rgba(197, 160, 89, 0.82), transparent);
        opacity: 0.8;
    }

    #contact .gl_tp_top_label {
        font-family: 'Montserrat', sans-serif !important;
        font-size: 11px !important;
        line-height: 1.8 !important;
        letter-spacing: 0.4em !important;
        text-transform: uppercase !important;
        font-weight: 500 !important;
        text-align: center !important;
        margin: 0 0 42px !important;
    }

    #contact .gl_desktop_grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 28px;
        align-items: start;
        margin: 0 auto 28px;
        max-width: 900px;
    }

    #contact .gl_tp_col,
    #contact .gl_tp_card {
        border: 1px solid rgba(197, 160, 89, 0.24);
        background: rgba(12, 12, 12, 0.54);
    }

    #contact .gl_tp_col {
        min-height: 100%;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #contact .gl_tp_section {
        width: 100%;
        text-align: center;
    }

    #contact .gl_tp_section_label,
    #contact .gl_tp_card_head,
    #contact .gl_tp_social_title,
    #contact .gl_action_label,
    #contact .gl_tp_route_btn {
        font-family: 'Montserrat', sans-serif !important;
        text-transform: uppercase !important;
    }

    #contact .gl_tp_section_label {
        display: block;
        font-size: 10px !important;
        line-height: 1.6 !important;
        letter-spacing: 0.28em !important;
        margin-bottom: 12px !important;
    }

    #contact .gl_tp_address_text,
    #contact .gl_tp_phone_number {
        display: block;
        color: #ffffff !important;
        text-align: center !important;
        text-decoration: none !important;
        font-family: 'Cormorant Garamond', serif !important;
        font-style: italic !important;
        font-weight: 300 !important;
        line-height: 1.18 !important;
        margin: 0 auto 10px !important;
    }

    #contact .gl_tp_address_text { font-size: 24px !important; max-width: 420px; }
    #contact .gl_tp_phone_number { font-size: 26px !important; }

    #contact .gl_tp_route_btn {
        display: inline-block;
        font-size: 8px !important;
        letter-spacing: 0.22em !important;
        color: rgba(255, 255, 255, 0.45) !important;
        transition: color 0.25s ease;
    }

    #contact .gl_tp_route_btn:hover { color: #C5A059 !important; }

    #contact .gl_tp_hours_row {
        font-family: 'Cormorant Garamond', serif !important;
        font-size: 18px !important;
        line-height: 1.45 !important;
        color: #ffffff !important;
        margin: 4px 0 !important;
        text-align: center !important;
    }

    #contact .gl_tp_social_grid {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 20px;
    }

    #contact .gl_tp_social_link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-width: 90px;
    }

    #contact .gl_tp_icon_circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(197, 160, 89, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #C5A059;
    }

    #contact .gl_widgets_grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
        gap: 28px;
        max-width: 980px;
        margin: 0 auto;
        align-items: stretch;
    }

    #contact .gl_tp_card {
        overflow: hidden;
    }

    #contact .gl_tp_card_head {
        background: #0a0a0a !important;
        border-bottom: 1px solid rgba(197, 160, 89, 0.28);
        padding: 14px 16px !important;
        font-size: 10px !important;
        letter-spacing: 0.24em !important;
        text-align: center !important;
    }

    #contact .gl_rating_container {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    #contact .gl_rating_item {
        display: grid;
        grid-template-columns:
            minmax(150px, 1.12fr)
            minmax(92px, 0.7fr)
            minmax(54px, 0.34fr)
            minmax(78px, 0.52fr);
        gap: clamp(14px, 2.5vw, 28px);
        align-items: center;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        transition: background 0.25s ease;
    }

    #contact .gl_rating_item:last-child { border-bottom: 0; }
    #contact .gl_platform_box {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
        min-width: 0;
    }
    #contact .gl_platform_name {
        color: #ffffff;
        font-size: 15px;
        line-height: 1.1;
        transition: color 0.25s ease;
    }
    #contact .gl_action_label {
        display: block;
        color: rgba(255, 255, 255, 0.38);
        font-size: 8px;
        line-height: 1.35;
        letter-spacing: 0.12em;
        transition: color 0.25s ease;
    }
    #contact .gl_stars_box {
        color: #C5A059;
        white-space: nowrap;
        text-align: left;
        width: clamp(72px, 8vw, 86px);
        display: inline-flex;
        justify-content: flex-start;
        gap: 1px;
        justify-self: start;
        align-self: center;
        transition: color 0.25s ease, filter 0.25s ease;
    }

    #contact .gl_stars_box i {
        width: clamp(9px, 0.9vw, 10px);
        flex: 0 0 clamp(9px, 0.9vw, 10px);
        text-align: center;
        line-height: 1;
    }

    #contact .gl_rating_stats {
        display: contents;
    }
    #contact .gl_rating_value {
        justify-self: start;
        text-align: left;
        white-space: nowrap;
        font-size: clamp(18px, 1.9vw, 24px) !important;
        line-height: 1;
    }
    #contact .gl_rating_count {
        min-width: 0;
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 1px;
        color: rgba(255, 255, 255, 0.42);
        line-height: 1.05;
        white-space: normal;
        justify-self: start;
        text-align: left;
    }
    #contact .gl_rating_count_num,
    #contact .gl_rating_count_word {
        display: block;
        max-width: 100%;
        overflow-wrap: normal;
    }
    #contact .gl_rating_count_num {
        font-size: clamp(9px, 1vw, 11px);
        letter-spacing: 0.08em;
        white-space: nowrap;
    }
    #contact .gl_rating_count_word {
        font-size: clamp(7px, 0.82vw, 9px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
    }
    #contact .gl_rating_item:hover {
        background: rgba(197, 160, 89, 0.045);
    }
    #contact .gl_rating_item:hover .gl_platform_name,
    #contact .gl_rating_item:hover .gl_action_label {
        color: #C5A059 !important;
    }
    #contact .gl_rating_item:hover .gl_stars_box {
        filter: brightness(1.18);
    }

    #contact .gl_map_wrapper,
    #contact .gl_dark_map_frame {
        width: 100%;
        height: 100%;
        min-height: 300px;
    }

    #contact .gl_dark_map_frame {
        border: 0;
        filter: none !important;
        opacity: 1 !important;
    }

    @media (max-width: 767px) {
        #contact .gl_tp_body_wrapper {
            padding: 48px 16px 56px;
        }

        #contact .gl_tp_top_label {
            margin-bottom: 30px !important;
            font-size: 10px !important;
            letter-spacing: 0.28em !important;
        }

        #contact .gl_desktop_grid,
        #contact .gl_widgets_grid {
            grid-template-columns: 1fr;
            gap: 18px;
        }

        #contact .gl_tp_col {
            padding: 24px 18px;
        }

        #contact .gl_tp_address_text {
            font-size: 22px !important;
        }

        #contact .gl_tp_phone_number {
            font-size: 24px !important;
        }

        #contact .gl_tp_hours_row {
            font-size: 16px !important;
        }

        #contact .gl_rating_item {
            grid-template-columns:
                minmax(76px, 1fr)
                minmax(54px, 0.72fr)
                minmax(32px, 0.38fr)
                minmax(44px, 0.52fr);
            gap: clamp(6px, 2vw, 10px);
            padding: 14px 0;
            text-align: left;
        }

        #contact .gl_stars_box {
            width: clamp(50px, 15vw, 62px);
            gap: 0;
        }

        #contact .gl_stars_box i {
            width: clamp(7px, 2.05vw, 8px);
            flex-basis: clamp(7px, 2.05vw, 8px);
            font-size: clamp(7px, 2.05vw, 8px) !important;
        }

        #contact .gl_rating_value {
            font-size: clamp(13px, 4vw, 16px) !important;
        }

        #contact .gl_rating_count_num {
            font-size: clamp(8px, 2.6vw, 10px);
        }

        #contact .gl_rating_count_word {
            font-size: clamp(6px, 2.1vw, 8px);
            letter-spacing: 0.05em;
        }

        #contact .gl_platform_name {
            font-size: 14px;
        }

        #contact .gl_action_label {
            font-size: 7px;
            letter-spacing: 0.08em;
        }
    }
</style>

<div id="contact" class="gl_full_width_bg">
    <div class="gl_tp_body_wrapper">
        
        <div class="gl_tp_main_title gl_tp_serif">Concierge & Information</div>
        <div class="gl_tp_hr_top"></div>
        <div class="gl_tp_top_label gl_tp_sans"><span class="subtitle-gold">Контактная информация</span></div>

        <div class="gl_desktop_grid">
            <div class="gl_tp_col">
                <div class="gl_tp_section">
                    <span class="gl_tp_section_label gl_tp_sans"><span class="subtitle-gold">Location</span></span>
                    <a href="<cms:show cont_map_link />" target="_blank" class="gl_tp_address_text gl_tp_serif"><cms:show cont_address /></a>
                    <a href="<cms:show cont_map_link />" target="_blank" class="gl_tp_route_btn gl_tp_sans">построить маршрут</a>
                </div>
                <div class="gl_tp_hr_gold"></div>
                <div class="gl_tp_section">
                    <span class="gl_tp_section_label gl_tp_sans"><span class="subtitle-gold">Opening Hours</span></span>
                    <div class="gl_tp_serif">
                        <p class="gl_tp_hours_row" style="font-size: 18px !important;">Пн–Чт; Вс <span class="subtitle-gold" style="margin-left: 10px !important;"><cms:show cont_hours_1 /></span></p>
                        <p class="gl_tp_hours_row" style="font-size: 18px !important;">Пт–Сб <span class="subtitle-gold" style="margin-left: 10px !important;"><cms:show cont_hours_2 /></span></p>
                    </div>
                </div>
            </div>

            <div class="gl_tp_col">
                <div class="gl_tp_section">
                    <span class="gl_tp_section_label gl_tp_sans"><span class="subtitle-gold">Contact Us</span></span>
                    <a href="tel:<cms:show cont_phone_link />" class="gl_tp_phone_number gl_tp_serif"><cms:show cont_phone /></a>
                    
                    <div class="gl_tp_social_grid">
                        <a href="<cms:show cont_whatsapp />" target="_blank" class="gl_tp_social_link">
                            <div class="gl_tp_icon_circle"><i class="fab fa-whatsapp text-2xl"></i></div>
                            <span class="gl_tp_social_title gl_tp_sans"><span class="subtitle-gold">WhatsApp</span></span>
                        </a>
                        <a href="<cms:show cont_telegram />" target="_blank" class="gl_tp_social_link">
                            <div class="gl_tp_icon_circle"><i class="fab fa-telegram-plane text-2xl"></i></div>
                            <span class="gl_tp_social_title gl_tp_sans"><span class="subtitle-gold">Telegram</span></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="gl_widgets_grid">
            <div class="gl_tp_card">
                <div class="gl_tp_card_head gl_tp_sans"><span class="subtitle-gold">Guest Reviews & Ratings</span></div>
                <div class="gl_rating_container">
                    
                    <a href="<cms:show cont_map_link />reviews/" target="_blank" class="gl_rating_item">
                        <div class="gl_platform_box">
                            <span class="gl_platform_name">Yandex</span>
                            <span class="gl_action_label">написать отзыв</span>
                        </div>
                        <div class="gl_stars_box">
                            <cms:repeat count='5'><i class="fas fa-star" style="font-size: 10px;"></i></cms:repeat>
                        </div>
                        <div class="gl_rating_stats">
                            <span class="gl_rating_value subtitle-gold" style="font-size: 18px; font-weight: 700;"><cms:show rate_yandex_val /></span>
                            <span class="gl_rating_count"><cms:show rate_yandex_count /></span>
                        </div>
                    </a>

                    <a href="https://2gis.ru/spb/firm/70000001089303834/tab/reviews" target="_blank" class="gl_rating_item">
                        <div class="gl_platform_box">
                            <span class="gl_platform_name">2GIS</span>
                            <span class="gl_action_label">написать отзыв</span>
                        </div>
                        <div class="gl_stars_box">
                            <cms:repeat count='5'><i class="fas fa-star" style="font-size: 10px;"></i></cms:repeat>
                        </div>
                        <div class="gl_rating_stats">
                            <span class="gl_rating_value subtitle-gold" style="font-size: 18px; font-weight: 700;"><cms:show rate_2gis_val /></span>
                            <span class="gl_rating_count"><cms:show rate_2gis_count /></span>
                        </div>
                    </a>

                    <a href="<cms:show rate_google_link />" target="_blank" class="gl_rating_item">
                        <div class="gl_platform_box">
                            <span class="gl_platform_name">Google</span>
                            <span class="gl_action_label">написать отзыв</span>
                        </div>
                        <div class="gl_stars_box">
                            <cms:repeat count='5'><i class="fas fa-star" style="font-size: 10px;"></i></cms:repeat>
                        </div>
                        <div class="gl_rating_stats">
                            <span class="gl_rating_value subtitle-gold" style="font-size: 18px; font-weight: 700;"><cms:show rate_google_val /></span>
                            <span class="gl_rating_count"><cms:show rate_google_count /></span>
                        </div>
                    </a>

                </div>
            </div>

            <div class="gl_tp_card">
                <div class="gl_map_wrapper">
                    <iframe src="<cms:show cont_map_iframe />" class="gl_dark_map_frame" loading="lazy"></iframe>
                </div>
            </div>
        </div>
        
    </div>
</div>

<script>
    document.querySelectorAll('#contact .gl_rating_count').forEach((item) => {
        const raw = item.textContent.replace(/\s+/g, ' ').trim();
        const match = raw.match(/^(.+?)\s+([^\s]+)$/);
        if (!match) return;

        item.innerHTML = `<span class="gl_rating_count_num">${match[1]}</span><span class="gl_rating_count_word">${match[2]}</span>`;
    });
</script>
