<style>

    :root { --bg-deep: #000000; --bg-accent: #0c0c0c; --text-main: #EAEAEA; --gold-matte: #C5A059; --gold-bright: #FFEebb; }

    .font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }
    .film-grain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('/img/noise.svg'); opacity: 0.04; pointer-events: none; z-index: 1; }
    .fade-up { animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .shimmer-text-gold { background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: text-shine 5s linear infinite; display: inline-block; }
    @keyframes text-shine { to { background-position: 200% center; } }
    .shimmer-line { width: 160px; height: 1px; background: linear-gradient(90deg, rgba(197, 160, 89, 0) 0%, rgba(197, 160, 89, 1) 50%, rgba(197, 160, 89, 0) 100%); margin: var(--gl-gold-gap, 12px) auto; position: relative; box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
    .gl-btn-luxe { width: 100%; max-width: 100%; box-sizing: border-box; padding: 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em; font-weight: 800; cursor: pointer; border: none; border-radius: 2px; color: #000; background: linear-gradient(135deg, #8e7037 0%, #C5A059 30%, #FFEebb 50%, #C5A059 70%, #8e7037 100%); background-size: 400% 400%; animation: luxe-shimmer 8s ease infinite, luxe-pulse 4s infinite; box-shadow: 0 4px 20px rgba(197, 160, 89, 0.15); transition: transform 0.2s; }
    @keyframes luxe-shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes luxe-pulse { 0%, 100% { box-shadow: 0 4px 20px rgba(197, 160, 89, 0.15); } 50% { box-shadow: 0 8px 40px rgba(197, 160, 89, 0.3); } }
    .gl-input-line { width: 100%; max-width: 100%; box-sizing: border-box; min-width: 0; background: transparent !important; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.25); padding: 12px 0; color: white !important; font-weight: 300; outline: none; transition: border-color 0.4s; border-radius: 0; }
    .gl-input-line:focus { border-bottom-color: var(--gold-matte); }

<div class="gl-toast" id="glToast"></div>

<script>
    (function() {
        const TOAST = document.getElementById('glToast');
        const MODAL = document.getElementById('glModal');
        const MODAL_OK = document.getElementById('glModalOk');
        function showToast(msg) { TOAST.textContent = msg; TOAST.style.display = 'block'; setTimeout(() => TOAST.style.display = 'none', 3500); }
        MODAL_OK.onclick = () => MODAL.classList.remove('is-open');

        const form = document.querySelector('#reservation form');
        if (!form) return;

        const phoneInput = form.querySelector('.phone-mask');
        const dateInput = form.querySelector('#visit_date');
        const dateWrap = form.querySelector('.res-date-wrap');
        const dateLabel = form.querySelector('#visit_date_label');
        const hoursInput = form.querySelector('.time-hours');
        const minutesInput = form.querySelector('.time-minutes');
        const timeHidden = form.querySelector('.visit-time-hidden');
        const guestSelect = form.querySelector('.guest-select');
        const btn = form.querySelector('button');

        const today = new Date();
        const minDate = today.toISOString().slice(0, 10);
        dateInput.min = minDate;

        function formatDateLabel(isoDate) {
            const [y, m, d] = isoDate.split('-');
            return d + '.' + m + '.' + y;
        }

        function syncDateLabel() {
            if (!dateLabel || !dateWrap) return;
            if (dateInput.value) {
                dateLabel.textContent = formatDateLabel(dateInput.value);
                dateWrap.classList.remove('is-empty');
            } else {
                dateLabel.textContent = 'Календарь';
                dateWrap.classList.add('is-empty');
            }
        }

        if (dateWrap) {
            dateWrap.addEventListener('click', () => {
                if (typeof dateInput.showPicker === 'function') {
                    try { dateInput.showPicker(); return; } catch (err) {}
                }
                dateInput.focus();
            });
        }
        dateInput.addEventListener('change', syncDateLabel);
        syncDateLabel();

        for (let i = 1; i <= 20; i++) {
            guestSelect.add(new Option(i + (i < 5 ? ' гостя' : ' гостей'), i));
        }

        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            if (!x[2]) { e.target.value = x[1] ? '+7' : ''; return; }
            e.target.value = '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });

        function onlyDigits(value, maxLen) {
            return value.replace(/\D/g, '').slice(0, maxLen);
        }

        function padTimePart(value) {
            if (value.length === 1) return '0' + value;
            return value;
        }

        function syncTimeHidden() {
            const h = hoursInput.value.trim();
            const m = minutesInput.value.trim();
            timeHidden.value = (h && m) ? (padTimePart(h) + ':' + padTimePart(m)) : '';
        }

        hoursInput.addEventListener('input', (e) => {
            let v = onlyDigits(e.target.value, 2);
            if (v.length === 2) {
                const h = parseInt(v, 10);
                if (h > 23) v = '23';
            }
            e.target.value = v;
            syncTimeHidden();
            if (v.length === 2) minutesInput.focus();
        });

        hoursInput.addEventListener('blur', () => {
            if (hoursInput.value.length === 1) {
                hoursInput.value = '0' + hoursInput.value;
                syncTimeHidden();
            }
        });

        minutesInput.addEventListener('input', (e) => {
            let v = onlyDigits(e.target.value, 2);
            if (v.length === 2) {
                const m = parseInt(v, 10);
                if (m > 59) v = '59';
            }
            e.target.value = v;
            syncTimeHidden();
        });

        minutesInput.addEventListener('blur', () => {
            if (minutesInput.value.length === 1) {
                minutesInput.value = '0' + minutesInput.value;
                syncTimeHidden();
            }
        });

        minutesInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && minutesInput.value === '') hoursInput.focus();
        });

        hoursInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && hoursInput.value === '') hoursInput.value = '';
        });

        function formatDateForApi(isoDate) {
            const [y, m, d] = isoDate.split('-');
            return d + '.' + m + '.' + y;
        }

        function isValidTime(h, m) {
            if (!/^\d{1,2}$/.test(h) || !/^\d{1,2}$/.test(m)) return false;
            const hi = parseInt(h, 10);
            const mi = parseInt(m, 10);
            return hi >= 0 && hi <= 23 && mi >= 0 && mi <= 59;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            if (fd.get('website')) return;

            const p = (fd.get('phone') || '').replace(/\D/g, '');
            if (p.length < 11) { showToast('Введите верный номер телефона'); return; }
            if (!dateInput.value) { showToast('Выберите дату визита'); return; }

            const hRaw = hoursInput.value.trim();
            const mRaw = minutesInput.value.trim();
            if (!isValidTime(hRaw, mRaw)) { showToast('Укажите время визита'); return; }

            syncTimeHidden();
            if (!guestSelect.value) { showToast('Пожалуйста, заполните все поля'); return; }

            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = 'ОТПРАВКА...';

            try {
                const params = new URLSearchParams();
                for (const [key, value] of fd.entries()) {
                    if (key === 'visit_date') continue;
                    params.append(key, value);
                }
                const [y, m, d] = dateInput.value.split('-');
                params.append('visit_day', d);
                params.append('visit_month', m);
                params.append('date', formatDateForApi(dateInput.value));
                params.set('visit_time', timeHidden.value);

                const resp = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
                let data = null;
                try { data = await resp.json(); } catch (err) {}
                if (resp.ok && data && data.ok) {
                    var goal = form.getAttribute('data-gl-goal');
                    if (goal && typeof window.glMetrikaReachGoal === 'function') {
                        window.glMetrikaReachGoal(goal);
                    } else if (goal && typeof ym === 'function') {
                        ym(110415128, 'reachGoal', goal);
                    }
                    MODAL.classList.add('is-open');
                    form.reset();
                    dateInput.min = minDate;
                    syncDateLabel();
                    timeHidden.value = '';
                } else {
                    showToast((data && data.message) ? data.message : 'Ошибка. Попробуйте позже.');
                }
            } catch (err) {
                showToast('Проверьте интернет-соединение');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };
    })();
</script>
