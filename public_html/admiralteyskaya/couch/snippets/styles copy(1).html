:root{

.gl-shimmer{

#preloader {

    background-color: var(--bg-black);

/* Полный блок стилей для прелоадера — заменить старый на этот */

#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000; /* Глубокий черный фон под цвет видео */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10001; /* Максимальный приоритет над всем контентом */
    opacity: 1;
    visibility: visible;
    transition: opacity 0.8s ease, visibility 0.8s ease;

}

    width: 100%;

}

.preloader-hidden {
    opacity: 0 !important;

}
