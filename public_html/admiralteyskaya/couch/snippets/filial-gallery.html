<script>
    function changeBfTab(tabId, btnElement) {
        var gallery = document.querySelector('[data-bf-gallery]');
        if (!gallery) return;

        gallery.querySelectorAll('.bf-category-pane').forEach(function (el) {
            el.classList.remove('active');
        });
        gallery.querySelectorAll('.bf-tab-btn').forEach(function (btn) {
            btn.classList.remove('active');
        });

        var activeTab = document.getElementById(tabId);
        if (activeTab) activeTab.classList.add('active');
        if (btnElement) btnElement.classList.add('active');
    }

    function scrollBfSlider(sliderId, direction) {
        var slider = document.getElementById(sliderId);
        if (!slider) return;
        var items = slider.querySelectorAll('.gallery-slide-item');
        if (!items.length) return;

        var scrollLeft = slider.scrollLeft;
        var pad = parseFloat(getComputedStyle(slider).scrollPaddingLeft) || 0;
        var current = 0;
        for (var i = 0; i < items.length; i++) {
            if (items[i].offsetLeft <= scrollLeft + 3) current = i;
        }
        var targetIndex = Math.max(0, Math.min(items.length - 1, current + direction));
        slider.scrollTo({
            left: Math.max(0, items[targetIndex].offsetLeft - pad),
            behavior: 'smooth'
        });
    }

    window.changeBfTab = changeBfTab;
    window.scrollBfSlider = scrollBfSlider;
</script>
