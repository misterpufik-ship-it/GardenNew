<style>
    .branch-filial-gallery {
        width: 100%;
        margin: 0 auto;
        text-align: left;
    }

    .branch-filial-gallery .bf-category-pane {
        display: none;
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .branch-filial-gallery .bf-category-pane.active {
        display: block;
        opacity: 1;
    }

    .branch-filial-gallery .bf-tab-btn {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #666;
        padding-bottom: 4px;
        border: 0;
        border-bottom: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        transition: 0.3s;
    }

    .branch-filial-gallery .bf-tab-btn.active {
        color: #C5A059;
        border-bottom-color: #C5A059;
    }

    .ratio-1-1 { width: 75%; aspect-ratio: 1/1; }
    .ratio-3-2 { width: calc(75% * 1.5); aspect-ratio: 3/2; }

    @media (min-width: 768px) {
        .ratio-1-1 { width: calc(25% - 12px); }
        #bf-tab-interior .ratio-3-2 { width: calc((25% - 12px) * 1.5); }
    }
</style>

<cms:set bf_gallery_source='udelnaya/gallery.php' />
<cms:if k_template_name='udelnaya/filial.php'>
    <cms:set bf_gallery_source='gallery.php' />
</cms:if>

<div class="branch-filial-gallery" data-bf-gallery>
    <div class="flex justify-center gap-8 mb-8">
        <button type="button" onclick="changeBfTab('bf-tab-interior', this)" class="bf-tab-btn active">Interior</button>
        <button type="button" onclick="changeBfTab('bf-tab-menu', this)" class="bf-tab-btn">Kitchen</button>
        <button type="button" onclick="changeBfTab('bf-tab-vibe', this)" class="bf-tab-btn">Vibe</button>
    </div>

    <div class="relative w-full">
        <div id="bf-tab-interior" class="bf-category-pane active">
            <div class="slider-relative-box">
                <button type="button" class="slider-arrow arrow-left" onclick="scrollBfSlider('bf-slider-interior', -1)" aria-label="Предыдущее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                <button type="button" class="slider-arrow arrow-right" onclick="scrollBfSlider('bf-slider-interior', 1)" aria-label="Следующее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg></button>

                <div id="bf-slider-interior" class="slider-snap-area gap-3 px-2 pb-6 no-scroll">
                    <cms:pages masterpage="<cms:show bf_gallery_source />" limit='1'>
                        <cms:set gallery_tab='interior' />
                        <cms:embed 'gallery-slides-block.html' />
                    </cms:pages>
                </div>
            </div>
        </div>

        <div id="bf-tab-menu" class="bf-category-pane">
            <div class="slider-relative-box">
                <button type="button" class="slider-arrow arrow-left" onclick="scrollBfSlider('bf-slider-menu', -1)" aria-label="Предыдущее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                <button type="button" class="slider-arrow arrow-right" onclick="scrollBfSlider('bf-slider-menu', 1)" aria-label="Следующее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg></button>

                <div id="bf-slider-menu" class="slider-snap-area gap-3 px-2 pb-6 no-scroll">
                    <cms:pages masterpage="<cms:show bf_gallery_source />" limit='1'>
                        <cms:set gallery_tab='menu' />
                        <cms:embed 'gallery-slides-block.html' />
                    </cms:pages>
                </div>
            </div>
        </div>

        <div id="bf-tab-vibe" class="bf-category-pane">
            <div class="slider-relative-box">
                <button type="button" class="slider-arrow arrow-left" onclick="scrollBfSlider('bf-slider-vibe', -1)" aria-label="Предыдущее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                <button type="button" class="slider-arrow arrow-right" onclick="scrollBfSlider('bf-slider-vibe', 1)" aria-label="Следующее фото"><svg class="gallery-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg></button>

                <div id="bf-slider-vibe" class="slider-snap-area gap-3 px-2 pb-6 no-scroll">
                    <cms:pages masterpage="<cms:show bf_gallery_source />" limit='1'>
                        <cms:set gallery_tab='vibe' />
                        <cms:embed 'gallery-slides-block.html' />
                    </cms:pages>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changeBfTab(tabId, btnElement) {
        var gallery = document.querySelector('[data-bf-gallery]');
        if (!gallery) return;

        gallery.querySelectorAll('.bf-category-pane').forEach(function (el) {
            el.classList.remove('active');
        });
        gallery.querySelectorAll('.bf-tab-btn').forEach(function (btn) {
            btn.classList.remove('active');
        });

        var activeTab = document.getElementById(tabId);
        if (activeTab) activeTab.classList.add('active');
        if (btnElement) btnElement.classList.add('active');
    }

    function getBfSlidePositions(slider, items) {
        var sliderLeft = slider.getBoundingClientRect().left;
        return Array.prototype.map.call(items, function(item) {
            return item.getBoundingClientRect().left - sliderLeft + slider.scrollLeft;
        });
    }

    function scrollBfSlider(sliderId, direction) {
        var slider = document.getElementById(sliderId);
        if (!slider) return;
        var items = slider.querySelectorAll('.gallery-slide-item');
        if (!items.length) return;

        var positions = getBfSlidePositions(slider, items);
        var scrollLeft = slider.scrollLeft;
        var closest = 0;
        var best = Infinity;
        for (var i = 0; i < positions.length; i++) {
            var dist = Math.abs(positions[i] - scrollLeft);
            if (dist < best) {
                best = dist;
                closest = i;
            }
        }

        var aligned = best < 6;
        var targetIndex = closest;
        if (direction > 0) {
            targetIndex = aligned
                ? Math.min(closest + 1, items.length - 1)
                : closest;
        } else {
            targetIndex = aligned
                ? Math.max(closest - 1, 0)
                : closest;
        }

        if (Math.abs(positions[targetIndex] - scrollLeft) < 1) return;

        slider.scrollTo({
            left: positions[targetIndex],
            behavior: 'smooth'
        });
    }

    window.changeBfTab = changeBfTab;
    window.scrollBfSlider = scrollBfSlider;
</script>
