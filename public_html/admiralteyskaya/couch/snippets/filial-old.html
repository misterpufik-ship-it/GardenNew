<style>

    .branch-section-container {
        margin: 0;

        position: relative;
        left: 50%;
        right: 50%;

        margin-right: -50vw;
        overflow: hidden;
    }

    .branch-wrapper {
        --bg-deep: #000000;
        --text-main: #EAEAEA;
        --gold-matte: #C5A059;

    .gold-line {

        margin: 16px auto;
        opacity: 0.8;
    }

    /* Подзаголовок с переливом */
    .subtitle-gold {

        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);

        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shineGold 5s linear infinite;
    }

    /* Стили изображения */
    .img-frame {
        position: relative;
        margin: 30px auto;
        width: 100%; /* На мобильных на всю ширину лимитера */

            margin: 40px auto;
        }
    }

    .img-premium {
        width: 100%;
        height: auto;
        display: block;
        filter: brightness(0.9);
    }

    /* Кнопка с переливом */
    .btn-action {

        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shineGold 5s linear infinite;
        font-weight: 500;
    }

    .btn-action:hover {
        border-color: rgba(197, 160, 89, 0.8);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    @keyframes shineGold {
        to { background-position: 100% center; }
    }

    .fade-up {

        to { opacity: 1; transform: translateY(0); }
