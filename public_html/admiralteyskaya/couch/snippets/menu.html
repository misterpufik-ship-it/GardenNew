<style>
    #menu-block {
        --gold: #C5A059;
        --gold-soft: rgba(197, 160, 89, 0.26);
        width: 100% !important;
        position: relative !important;
        margin: 0 !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
        background: #000;
        z-index: 5;
    }

    #menu-block .content-limiter {
        width: 100%;
        max-width: 940px;
        margin: 0 auto !important;
        padding: 0 20px;
        position: relative;
        z-index: 10;
    }

    #menu-block .font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }

    @keyframes menuShine { to { background-position: 200% center; } }

    #menu-block .shimmer-gold {
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: menuShine 5s linear infinite;
        display: inline-block;
    }

    #menu-block .fade-up {
        animation: menuFadeIn 1s ease-out forwards;
        opacity: 0;
    }

    @keyframes menuFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #menu-block .film-grain {
        position: absolute;
        inset: 0;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04;
        pointer-events: none;
        z-index: 1;
    }

    #menu-block .golden-line {
        width: 160px;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--gold), transparent);
        margin: 16px auto !important;
    }

    #menu-block .main-card {
        min-height: clamp(360px, 52vw, 480px);
        display: grid;
        grid-template-columns: minmax(0, 1.22fr) minmax(280px, 1fr);
        background: #070707;
        border: 1px solid var(--gold-soft);
        box-shadow: 0 18px 42px rgba(0,0,0,0.64);
        position: relative;
    }

    #menu-block .card-left {
        min-height: inherit;
        position: relative;
        overflow: hidden;
        border-right: 1px solid var(--gold-soft);
        text-decoration: none !important;
    }

    #menu-block .card-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.62;
        transition: transform 1.2s ease;
    }

    #menu-block .main-card:hover .card-left img { transform: scale(1.05); }

    #menu-block .visual-shade-a,
    #menu-block .visual-shade-b {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    #menu-block .visual-shade-a {
        background: linear-gradient(90deg, rgba(0,0,0,0.62), rgba(0,0,0,0.18), rgba(0,0,0,0.58));
    }

    #menu-block .visual-shade-b {
        background: linear-gradient(0deg, rgba(0,0,0,0.74), transparent 50%, rgba(0,0,0,0.18));
    }

    #menu-block .visual-menu-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 28px clamp(28px, 7vw, 135px);
    }

    #menu-block .menu-visual-title {
        font-size: clamp(40px, 5.1vw, 54px) !important;
        line-height: 1.07 !important;
        color: #fff !important;
        font-weight: 300 !important;
        text-shadow: 0 10px 28px rgba(0,0,0,0.78);
        margin: 0 !important;
    }

    #menu-block .visual-menu-cta {
        margin-top: 28px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(197,160,89,0.74);
    }

    #menu-block .gallery-open-caption,
    #menu-block .gallery-open-icon {
        font-size: 11px !important;
        line-height: 1.2 !important;
        letter-spacing: 0.22em !important;
        color: rgba(197,160,89,0.74) !important;
    }

    #menu-block .card-right {
        display: grid;
        grid-template-rows: 1fr 1fr;
        min-height: inherit;
    }

    #menu-block .menu-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-decoration: none !important;
        color: inherit !important;
        transition: background 0.3s ease;
    }

    #menu-block .menu-btn:hover { background: rgba(197,160,89,0.055); }

    #menu-block .menu-btn + .menu-btn {
        border-top: 1px solid var(--gold-soft);
    }

    #menu-block .menu-side-title {
        font-size: clamp(31px, 3.3vw, 39px) !important;
        line-height: 1.08 !important;
        color: var(--gold) !important;
        font-weight: 300 !important;
        margin: 0 0 16px !important;
    }

    #menu-block .menu-card-caption {
        font-family: 'Montserrat', sans-serif !important;
        font-size: 11px !important;
        line-height: 1.25 !important;
        letter-spacing: 0.24em !important;
        color: rgba(255,255,255,0.42) !important;
        text-transform: uppercase;
    }

    #menu-block .menu-card-caption-icon { display: none !important; }

    #menu-block .menu-footer-note {
        font-size: 11px !important;
        line-height: 1.8 !important;
        letter-spacing: 0.4em !important;
    }

    @media (max-width: 767px) {
        #menu-block .content-limiter {
            max-width: 440px;
            padding: 0 16px;
        }

        #menu-block .main-card {
            grid-template-columns: 1fr;
            min-height: 0;
        }

        #menu-block .card-left {
            min-height: 320px;
            border-right: 0;
            border-bottom: 1px solid var(--gold-soft);
        }

        #menu-block .visual-menu-content {
            align-items: center;
            text-align: center;
            padding: 28px 20px;
        }

        #menu-block .menu-visual-title {
            font-size: 42px !important;
        }

        #menu-block .visual-menu-cta {
            margin-top: 24px;
        }

        #menu-block .card-right {
            min-height: 340px;
        }

        #menu-block .menu-btn {
            padding: 26px 20px;
        }

        #menu-block .menu-side-title {
            font-size: 34px !important;
        }

        #menu-block .menu-card-caption,
        #menu-block .gallery-open-caption,
        #menu-block .gallery-open-icon {
            font-size: 10px !important;
        }
    }
</style>

<div id="menu-block">
    <div class="film-grain"></div>

    <div class="content-limiter">
        <div class="text-center mb-12 fade-up" style="animation-delay: 0.1s;">
            <h2 class="font-serif-lux text-3xl text-white font-light italic m-0"><cms:show menu_main_title /></h2>
            <div class="golden-line"></div>
            <p class="text-[12px] uppercase tracking-[0.4em] font-medium shimmer-gold m-0"><cms:show menu_sub_title /></p>
        </div>

        <div class="main-card fade-up" style="animation-delay: 0.3s;">
            <a href="<cms:show menu_visual_link />" target="_self" class="card-left">
                <img src="<cms:show menu_visual_img />" alt="Visual menu">
                <div class="visual-shade-a"></div>
                <div class="visual-shade-b"></div>

                <div class="visual-menu-content">
                    <h3 class="menu-visual-title font-serif-lux italic">
                        &#1042;&#1080;&#1079;&#1091;&#1072;&#1083;&#1100;&#1085;&#1086;&#1077;<br>&#1084;&#1077;&#1085;&#1102;
                    </h3>
                    <div class="visual-menu-cta">
                        <i class="gallery-open-icon fas fa-camera"></i>
                        <span class="gallery-open-caption uppercase">&#1054;&#1090;&#1082;&#1088;&#1099;&#1090;&#1100; &#1075;&#1072;&#1083;&#1077;&#1088;&#1077;&#1102;</span>
                    </div>
                </div>
            </a>

            <div class="card-right">
                <a href="<cms:show menu_text_link />" target="_self" class="menu-btn group">
                    <h3 class="menu-side-title font-serif-lux italic">&#1058;&#1077;&#1082;&#1089;&#1090;&#1086;&#1074;&#1086;&#1077;</h3>
                    <span class="menu-card-caption">Classic List</span>
                </a>

                <a href="<cms:show menu_eng_link />" target="_self" class="menu-btn group">
                    <h3 class="menu-side-title font-serif-lux italic">English</h3>
                    <span class="menu-card-caption">Classic List</span>
                </a>
            </div>
        </div>

        <div class="mt-12 text-center fade-up" style="animation-delay: 0.5s;">
            <p class="menu-footer-note uppercase font-medium shimmer-gold m-0 mb-8">
                <cms:show menu_footer_text />
            </p>

            <div class="flex justify-center">
                <img src="<cms:show menu_sep />" alt="Separator" class="w-64 h-auto opacity-70 object-contain">
            </div>
        </div>
    </div>
</div>
