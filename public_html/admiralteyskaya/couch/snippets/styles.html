<style>

  --gold-light: #FFEebb;
  --bg-black: #000;
  --text-main: #EAEAEA;
  --nav-offset: 96px;
  --gl-gold-gap: 12px;
  --gl-section-head-mb: 1.75rem;
  --gl-section-footer-mt: 1.25rem;

  --gl-divider-mt: 16px;
  --gl-section-py: 20px;
  --gl-py-philosophy: 20px;

  :root {
    --nav-offset: 84px;

/* Базовые сбросы и стабилизация скролла */
*, *::before, *::after { box-sizing: border-box; }
html { 
  scroll-behavior: smooth; 
  scroll-padding-top: var(--nav-offset);
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  background: var(--bg-black);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  position: relative;
}

img, video { max-width: 100%; height: auto; display: block; }
.font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }

/* Анимации */
@keyframes glShine { to { background-position: 200% center; } }
.gl-shimmer {
  background: linear-gradient(90deg,
    var(--gold-dark) 0%,
    var(--gold-main) 40%,
    var(--gold-light) 50%,
    var(--gold-main) 60%,
    var(--gold-dark) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: glShine 5s linear infinite;
}

/* Эффект шума */
.gl-grain {
  position: absolute; inset: 0;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: .04;
  pointer-events: none;
  z-index: 1;
}

/* Контейнеры и ограничители */
.gl-fullwidth {
  width: 100% !important;
  position: relative !important;
  left: 0 !important;
  right: 0 !important;
  margin-left: 0 !important;
  margin-right: 0 !important;
  overflow-x: hidden !important;
}

.gl-limiter {
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px;
}
@media(min-width: 768px) {
  .gl-limiter { max-width: 1200px; }
}

/* Прелоадер */
#preloader {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10001;
  opacity: 1;
  visibility: visible;
  transition: opacity 0.8s ease, visibility 0.8s ease;
  pointer-events: all;
  overflow: hidden;
}

#preloader-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
}

@media (max-width: 767px) {
  #preloader-video {
    width: auto;
    max-width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
  }
}

.preloader-hidden {
  opacity: 0 !important;
  visibility: hidden !important;
  pointer-events: none !important;
}

body.loading {
  overflow: hidden !important;
  height: 100vh;
}

/* FIX: Убираем дерганье на мобилках */
@media (max-width: 768px) {
  .gl-mobile-no-anim { animation: none !important; }
  .gl-mobile-no-blur { backdrop-filter: none !important; }
  
  .gl-fullwidth,
  .gl_full_width_bg,
  .taplink-block-wrapper,
  .garden-experience-widget,
  .branch-section-container,
  .philosophy-section-container, /* Добавил сюда */
  #menu-block {
    width: 100% !important;
    left: 0 !important;
    right: 0 !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    transform: none !important;
  }
}

/* Якоря для скролла */
#about-us,
#menu-block,
#photo,
#special,
#reservation,
#contact,
#branch-filial {
  scroll-margin-top: var(--nav-offset);
}
/* Стили кнопки Вверх */
.scroll-top-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 45px;
    height: 45px;
    background-color: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(197, 160, 89, 0.5);
    color: #C5A059;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    backdrop-filter: blur(5px);
}

.scroll-top-btn.show {
    opacity: 1;
    visibility: visible;
}

.scroll-top-btn:hover {
    background-color: rgba(197, 160, 89, 0.2);
    border-color: #C5A059;
    transform: translateY(-5px); /* Легкий эффект при наведении */
}

.scroll-top-btn i {
    font-size: 18px;
}

/* На мобилках делаем чуть меньше и смещаем, чтобы не мешала пальцам */
@media (max-width: 767px) {
    .scroll-top-btn {
        bottom: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
    }
}
