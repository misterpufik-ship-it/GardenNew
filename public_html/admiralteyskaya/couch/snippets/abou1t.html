<style>
    /* --- ВОЗВРАТ ОФОРМЛЕНИЯ --- */
    /* Сбрасываем системные отступы и размеры для SEO-тегов */
    .philosophy-section-container h1, 
    .philosophy-section-container h2 {
        font-size: inherit;
        font-weight: inherit;
        font-style: inherit;
        font-family: inherit;
        line-height: inherit;
        margin: 0;
        padding: 0;
        display: block;
        /* Убираем inherit для background, чтобы не ломать золотой градиент */
    }

    /* Твои оригинальные стили (БЕЗ ИЗМЕНЕНИЙ) */
    .philosophy-section-container {
        margin: 0; padding: 0; background-color: #000000; width: 100%; position: relative; overflow: hidden;
    }
    @media (max-width: 768px) {
        .philosophy-wrapper { width: 100%; padding: 40px 20px; min-height: auto; }
        .content-limiter { width: 100%; max-width: 100%; }
    }
    .philosophy-wrapper {
        --bg-deep: #000000; --text-main: #EAEAEA; --gold-matte: #C5A059;
        position: relative; width: 100%; min-height: 600px;
        display: flex; align-items: center; justify-content: center;
        background-color: var(--bg-deep); color: var(--text-main);
        font-family: 'Montserrat', sans-serif; padding: 1px 2px; 
    }
    .content-limiter { max-width: 600px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
    
    .title-philosophy {
        font-family: 'Cormorant Garamond', serif; font-size: 30px; line-height: 36px;
        font-weight: 300; font-style: italic; color: #ffffff; margin: 0; text-align: center;
    }
    
    .gold-line {
        width: 160px; height: 1px; margin: 16px auto; opacity: 0.8;
        background: linear-gradient(to right, transparent, #C5A059, transparent);
    }

    /* Этот блок отвечает за золотой текст - восстанавливаем его */
    .title-concept {
        font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.4em; margin: 0; text-align: center;
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto; 
        -webkit-background-clip: text; 
        background-clip: text;
        -webkit-text-fill-color: transparent; /* Обязательно для градиента на тексте */
        color: transparent; 
        animation: shineGold 5s linear infinite;
    }

    .slogan-rituals {
        font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.2em; text-align: center;
        line-height: 1.8; margin: 40px auto; max-width: 400px;
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent; animation: shineGold 5s linear infinite;
    }

    @keyframes shineGold { to { background-position: 200% center; } }
    .fade-up { animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .film-grain {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04; pointer-events: none; z-index: 1;
    }
    .separator-img { max-width: 256px; width: 100%; height: auto; opacity: 0.9; object-fit: contain; }
    
    .seo-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>

<section id="about-us" class="philosophy-section-container" itemscope itemtype="https://schema.org/AboutPage">
    <div class="philosophy-wrapper">
        <div class="film-grain"></div>
        <div class="content-limiter">
            <div class="fade-up">
                <h1 class="title-philosophy" itemprop="headline">
                    <cms:show phil_title />
                </h1>
            </div>
            <div class="fade-up" style="animation-delay: 0.2s;">
                <div class="gold-line"></div>
            </div>
            <div class="fade-up" style="animation-delay: 0.3s;">
                <h2 class="title-concept" itemprop="alternativeHeadline">
                    <cms:show phil_concept />
                </h2>
            </div>
            <div class="fade-up" style="animation-delay: 0.5s;">
                <div class="text-sm text-gray-300 font-light leading-relaxed mt-6 mb-4 tracking-wide text-center" itemprop="description">
                    <cms:show phil_content />
                </div>
                <div class="w-12 h-[1px] bg-[#C5A059]/40 my-10 mx-auto"></div>
                <p class="slogan-rituals">
                    <cms:show phil_slogan />
                </p>
                <div class="flex justify-center">
                    <img src="<cms:show phil_sep />" alt="Кальянная Garden Lounge Санкт-Петербург" class="separator-img" itemprop="image">
                </div>
            </div>
        </div>
    </div>
    <div class="seo-hidden">
        Лучшие кальяны в Санкт-Петербурге, лаундж бар в Адмиралтейском районе, забронировать столик.
    </div>
</section>
