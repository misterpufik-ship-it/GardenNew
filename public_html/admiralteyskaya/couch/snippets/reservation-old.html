<style>
    /* ОБЩИЕ ПЕРЕМЕННЫЕ И СТИЛИ */
    :root {
        --bg-deep: #000000; /* Чисто черный фон */
        --bg-accent: #0c0c0c;
        --text-main: #EAEAEA;
        --gold-matte: #C5A059;
        --gold-bright: #FFEebb;
    }

    .taplink-block-wrapper {
        width: 100vw;
        position: relative;
        left: 50%;
        margin-left: -50vw;
        z-index: 10; 
        background-color: var(--bg-deep);
        color: var(--text-main);
        font-family: 'Montserrat', sans-serif;
        /* Бесшовные стыки */
        margin-top: -1px;
        margin-bottom: -1px;
        overflow: hidden;
    }

    .content-limiter {
        max-width: 600px; 
        margin: 0 auto;
        width: 100%;
        position: relative;
        z-index: 10;
        padding: 40px 20px 60px 20px; 
    }

    .font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }

    /* ФОНОВЫЙ ШУМ (Film Grain) */
    .film-grain {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04; 
        pointer-events: none; 
        z-index: 1;
    }

    /* АНИМАЦИИ ПОЯВЛЕНИЯ */
    .fade-up { 
        animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
        opacity: 0; 
        transform: translateY(15px); 
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* ЭФФЕКТ ЗОЛОТОГО ПЕРЕЛИВА ДЛЯ ТЕКСТА */
    .shimmer-text-gold {
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: text-shine 5s linear infinite;
        display: inline-block;
    }
    @keyframes text-shine { to { background-position: 200% center; } }

    /* ЭФФЕКТ ЛИНИИ */
    .shimmer-line {
        width: 120px;
        height: 1px;
        background: linear-gradient(90deg, rgba(197, 160, 89, 0) 0%, rgba(197, 160, 89, 1) 50%, rgba(197, 160, 89, 0) 100%);
        margin: 20px auto;
        position: relative;
        box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
    }

    /* КНОПКА LUXE SHIMMER */
    .gl-btn-luxe {
        width: 100%;
        padding: 18px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        font-weight: 800;
        cursor: pointer;
        border: none;
        border-radius: 2px;
        color: #000;
        background: linear-gradient(135deg, #8e7037 0%, #C5A059 30%, #FFEebb 50%, #C5A059 70%, #8e7037 100%);
        background-size: 400% 400%;
        animation: luxe-shimmer 8s ease infinite, luxe-pulse 4s infinite;
        box-shadow: 0 4px 20px rgba(197, 160, 89, 0.15);
        transition: transform 0.2s;
    }
    @keyframes luxe-shimmer {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    @keyframes luxe-pulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(197, 160, 89, 0.15); }
        50% { box-shadow: 0 8px 40px rgba(197, 160, 89, 0.3); }
    }

    /* СТИЛИ ФОРМЫ */
    .gl-input-line {
        width: 100%;
        background: transparent !important;
        border: none;
        border-bottom: 1px solid rgba(197, 160, 89, 0.25);
        padding: 12px 0;
        color: white !important;
        font-weight: 300;
        outline: none;
        transition: border-color 0.4s;
        border-radius: 0;
    }
    .gl-input-line:focus { border-bottom-color: var(--gold-matte); }
    .gl-input-line::placeholder { color: rgba(255,255,255,0.2); }
    
    select.gl-input-line { background-color: transparent !important; color: white !important; }
    select.gl-input-line option { background-color: #0c0c0c; color: white; }

    .gl-label-mini {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        /* Цвет теперь управляется через shimmer-text-gold, но оставим для фоллбэка */
        color: var(--gold-matte);
        display: block;
        margin-bottom: 4px;
        opacity: 1; /* Убрана прозрачность, чтобы шиммер был ярче */
    }

    .hp { position: absolute; left: -9999px; opacity: 0; }

    /* СТИЛИ МОДАЛЬНОГО ОКНО И ТОСТОВ */
    .gl-modal {
        position: fixed; inset: 0; z-index: 10000;
        display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .gl-modal.is-open { display: flex; }
    .gl-modal__backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); }
    .gl-modal__card {
        position: relative; background: #000000; border: 1px solid rgba(197, 160, 89, 0.2);
        padding: 40px 24px; text-align: center; max-width: 420px; width: 100%; z-index: 2;
    }
    .gl-toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: #0c0c0c; color: #C5A059; border: 1px solid rgba(197, 160, 89, 0.3);
        padding: 10px 20px; font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.1em; z-index: 10001; display: none; text-align: center;
    }

    /* РАЗДЕЛИТЕЛЬ */
    .divider-container {
        width: 100%; display: flex; justify-content: center; 
        margin: 20px 0; opacity: 0.6;
    }
    .divider-image { max-width: 280px; width: 80%; height: auto; filter: brightness(0.9); }
</style>

<!-- СЕКЦИЯ БРОНИРОВАНИЯ (id="reservation" для якоря из меню) -->
<div id="reservation" class="taplink-block-wrapper">
    <!-- Эффект зернистости -->
    <div class="film-grain"></div>
    
    <div class="content-limiter">
        <!-- Шапка -->
        <header class="fade-up mb-10 text-center">
            <h1 class="font-serif-lux text-3xl text-white font-light italic m-0">Reservation</h1>
            
            <div class="shimmer-line"></div>
            
            <p class="text-[12px] uppercase tracking-[0.45em] font-medium m-0 shimmer-text-gold">Забронировать столик</p>
        </header>

        <form class="gl-form-modern space-y-10 fade-up" style="animation-delay: 0.2s;" action="https://1.misterpufik.workers.dev" method="POST">
            <input type="text" name="website" class="hp">
            <div class="space-y-2">
                <label class="gl-label-mini text-center"><span class="shimmer-text-gold">Ваше имя</span></label>
                <input class="gl-input-line text-center !text-xl font-serif-lux italic" name="name" placeholder="Например: Никита" required>
            </div>
            <div class="space-y-2">
                <label class="gl-label-mini text-center"><span class="shimmer-text-gold">Номер телефона</span></label>
                <input class="gl-input-line text-center !text-lg phone-mask" name="phone" placeholder="+7 (___) ___-__-__" required>
            </div>
            <div class="flex items-end justify-center gap-4 md:gap-8">
                <div class="flex-1">
                    <label class="gl-label-mini text-center"><span class="shimmer-text-gold">Дата визита</span></label>
                    <div class="flex justify-center items-center gap-1 border-b border-[#C5A059]/25 pb-2">
                        <select class="bg-transparent text-white outline-none day-select text-base" name="visit_day" required>
                            <option value="" disabled selected>ДД</option>
                        </select>
                        <span class="font-light shimmer-text-gold">/</span>
                        <select class="bg-transparent text-white outline-none month-select text-base" name="visit_month" required>
                            <option value="" disabled selected>ММ</option>
                        </select>
                    </div>
                </div>
                <div class="flex-1">
                    <label class="gl-label-mini text-center"><span class="shimmer-text-gold">Гости</span></label>
                    <div class="border-b border-[#C5A059]/25 pb-2">
                        <select class="w-full bg-transparent text-white guest-select text-center text-base outline-none" name="guests" required>
                            <option value="" disabled selected>Кол-во</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="pt-4">
                <button class="gl-btn-luxe" type="submit">Забронировать</button>
            </div>
        </form>

        <!-- РАЗДЕЛИТЕЛЬ -->
        <div class="divider-container fade-up" style="animation-delay: 0.4s;">
            <img src="https://misterpufik.ru/div.png" alt="divider" class="divider-image">
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО -->
<div class="gl-modal" id="glModal">
    <div class="gl-modal__backdrop"></div>
    <div class="gl-modal__card">
        <h3 class="font-serif-lux text-4xl text-white italic mb-4 text-center">Спасибо!</h3>
        <p class="text-sm text-gray-400 font-light mb-8 text-center leading-relaxed">
            Ваше бронирование принято. Администратор свяжется с Вами для подтверждения.
        </p>
        <button class="gl-btn-luxe !py-3" id="glModalOk">ОК</button>
    </div>
</div>

<div class="gl-toast" id="glToast"></div>

<script>
(function() {
    const TOAST = document.getElementById('glToast');
    const MODAL = document.getElementById('glModal');
    const MODAL_OK = document.getElementById('glModalOk');

    function showToast(msg) {
        TOAST.textContent = msg;
        TOAST.style.display = 'block';
        setTimeout(() => TOAST.style.display = 'none', 3500);
    }

    MODAL_OK.onclick = () => MODAL.classList.remove('is-open');

    const form = document.querySelector('form');
    const phoneInput = form.querySelector('.phone-mask');
    const daySelect = form.querySelector('.day-select');
    const monthSelect = form.querySelector('.month-select');
    const guestSelect = form.querySelector('.guest-select');
    const btn = form.querySelector('button');

    // Наполнение селектов
    for (let i = 1; i <= 31; i++) {
        const val = String(i).padStart(2, '0');
        daySelect.add(new Option(val, val));
    }
    for (let i = 1; i <= 12; i++) {
        const val = String(i).padStart(2, '0');
        monthSelect.add(new Option(val, val));
    }
    for (let i = 1; i <= 20; i++) {
        guestSelect.add(new Option(i + (i < 5 ? ' гостя' : ' гостей'), i));
    }

    // Маска телефона
    phoneInput.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        if (!x[2]) { e.target.value = x[1] ? '+7' : ''; return; }
        e.target.value = '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });

    form.onsubmit = async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        if (fd.get('website')) return;
        
        const p = (fd.get('phone') || '').replace(/\D/g, '');
        if (p.length < 11) { showToast('Введите верный номер телефона'); return; }
        
        if (!daySelect.value || !monthSelect.value || !guestSelect.value) {
            showToast('Пожалуйста, заполните все поля');
            return;
        }

        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = 'ОТПРАВКА...';

        try {
            const params = new URLSearchParams();
            for (const [key, value] of fd.entries()) params.append(key, value);
            params.append('date', `${daySelect.value}.${monthSelect.value}.2026`);
            params.append('visit_time', '19:00');

            const resp = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });

            if (resp.ok) {
                MODAL.classList.add('is-open');
                form.reset();
            } else {
                showToast('Ошибка. Попробуйте позже.');
            }
        } catch (err) {
            showToast('Проверьте интернет-соединение');
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    };
})();
</script>
