<style>
    /* --- КРИТИЧЕСКИЙ СБРОС ДЛЯ SEO-ТЕГОВ (чтобы дизайн не ехал) --- */
    #navbar h1, #navbar h2, .hero-section h1, .hero-section h2 {
        font-size: inherit;
        font-weight: inherit;
        margin: 0;
        padding: 0;
        display: inline; /* Чтобы не занимали всю строку */
        line-height: inherit;
        font-family: inherit;
    }
    
    /* Скрытый текст только для ИИ-ботов */
    .seo-visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    :root {
        --gold-main: #C5A059;
        --gold-dark: #8e7037;
        --gold-light: #FFEebb;
        --bg-black: #000000;
    }

    /* --- БАЗА --- */
    html, body { width: 100%; overflow-x: hidden; background: #000; margin: 0; }

    /* --- HERO ФОТО --- */
    .hero-section {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 110px 20px 40px 20px;
        box-sizing: border-box;
        overflow: hidden;
    }

    .hero-bg { position: absolute; inset: 0; z-index: 1; }
    .hero-bg img { 
        position: absolute; inset: 0;
        width: 100%; height: 100%; 
        object-fit: cover; 
        opacity: 0.7;
    }
    .hero-overlay {
        position: absolute; inset: 0; z-index: 2;
        background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, transparent 70%, #000 100%);
    }

    /* --- АНИМАЦИИ --- */
    @keyframes glFadeInOnly { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes glLogoPulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.15); } }
    
    .logo-luxe-animate {
        opacity: 0;
        animation: glFadeInOnly 1.5s ease-out forwards, glLogoPulse 6s ease-in-out 1.5s infinite;
        will-change: transform, opacity;
        z-index: 10;
        display: block;
        margin-bottom: auto !important;
        transform: translateY(-25%) !important; 
    }

    @media (max-width: 767px) {
        .logo-luxe-animate {
            margin-top: -1vh !important; 
            transform: translateY(0) !important;
            width: 400px !important; 
        }
    }
    
    @keyframes goldShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .shimmer-text {
        background: linear-gradient(90deg, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        animation: goldShimmer 5s linear infinite;
        z-index: 10;
    }

    /* --- НАВИГАЦИЯ --- */
    .gl-navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; padding: 24px; transition: all 0.4s ease; background: transparent; }
    .gl-navbar.scrolled { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-top: 5px; padding-bottom: 5px; }
    
    .nav-link { position: relative; color: #ffffff !important; text-transform: uppercase; font-size: 11px; letter-spacing: 0.15em; font-weight: 500; transition: all 0.3s ease; padding: 8px 12px; text-decoration: none; border: 1px solid transparent; }
    .nav-booking-rect { border: 1px solid rgba(197, 160, 89, 0.6) !important; background-color: rgba(197, 160, 89, 0.1) !important; color: var(--gold-main) !important; }

    .branch-selector { position: relative; cursor: pointer; padding: 8px 16px; margin-right: 15px; z-index: 100; }
    .branch-dropdown { position: absolute; top: 100%; left: 0; min-width: 210px; background: rgba(0,0,0,0.9) !important; backdrop-filter: blur(10px); border: 1px solid var(--gold-main); display: none; flex-direction: column; z-index: 99; }
    .branch-selector.active .branch-dropdown { display: flex; }
    .branch-option { padding: 16px 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; color: rgba(255,255,255,0.7); cursor: pointer; }
    .branch-option.active { color: var(--gold-main); font-weight: 700; }

    .mobile-branch-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 1000001; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    .mobile-branch-modal.active { display: flex; }

    .mobile-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100svh; background-color: #080808; z-index: 100000; transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1); display: flex; flex-direction: column; align-items: center; visibility: hidden; }
    .mobile-menu-overlay.active { transform: translateY(0); visibility: visible; }
    .mobile-link { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #ffffff !important; margin: 6px 0; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; text-decoration: none; letter-spacing: 0.05em; border: 1px solid transparent; padding: 4px 24px; }
    .mobile-link.active-rect { border-color: rgba(197, 160, 89, 0.6) !important; background-color: rgba(197, 160, 89, 0.1) !important; color: var(--gold-main) !important; }
    .mobile-menu-overlay.active .mobile-link { opacity: 1; transform: translateY(0); }

    .tagline-premium { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em; filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.15)); display: inline-block; text-align: center; }
    .gold-line-thin { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-main), transparent); opacity: 0.6; z-index: 10; }

    @media (max-width: 767px) {
        .hero-section { height: 100svh; }
        .tagline-premium { font-size: 10px; letter-spacing: 0.15em; }
    }
</style>
