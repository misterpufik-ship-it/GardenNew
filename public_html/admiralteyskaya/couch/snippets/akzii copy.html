<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
    /* ОБЩИЕ СТИЛИ */
    .taplink-block-wrapper {
        --bg-deep: #000000;
        --bg-accent: #000000;
        --text-main: #EAEAEA;
        --gold-matte: #C5A059;
        
        width: 100vw;
        position: relative;
        left: 50%;
        margin-left: -50vw;
        z-index: 10; 
        background-color: var(--bg-deep);
        color: var(--text-main);
        font-family: 'Montserrat', sans-serif;
        margin-top: -2px; 
        overflow: hidden;
    }

    .content-limiter {
        max-width: 600px; 
        margin: 0 auto;
        width: 100%;
        position: relative;
        z-index: 10;
        padding: 60px 20px 30px 20px; 
    }

    .font-serif-lux { font-family: 'Cormorant Garamond', serif !important; }

    .film-grain {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.04; pointer-events: none; z-index: 1;
    }

    .shimmer-gold {
        background: linear-gradient(to right, #8e7037 0%, #C5A059 40%, #FFEebb 50%, #C5A059 60%, #8e7037 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 5s linear infinite;
        display: inline-block;
    }
    @keyframes shine { to { background-position: 200% center; } }

    .fade-up { 
        animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
        opacity: 0; 
        transform: translateY(10px); 
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .promo-card {
        border: 1px solid rgba(197, 160, 89, 0.2);
        background-color: rgba(20, 20, 20, 0.4);
        padding: 20px 20px; 
        text-align: center;
        transition: border-color 0.6s ease;
    }
    .promo-card:hover {
        border-color: rgba(197, 160, 89, 0.5);
    }

    .gold-line-fade {
        width: 160px;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--gold-matte), transparent);
        margin: 16px auto;
    }

    .bottom-divider {
        display: block;
        max-width: 280px;
        margin: 40px auto 0;
        opacity: 0.7;
    }
</style>

<div id="special" class="taplink-block-wrapper">
    <div class="film-grain"></div>

    <div class="content-limiter">
        <header class="text-center mb-12 fade-up">
            <h1 class="font-serif-lux text-3xl text-white font-light italic m-0">
                <cms:show akzii_main_title />
            </h1>
            <div class="gold-line-fade"></div>
            <p class="text-[12px] uppercase tracking-[0.4em] shimmer-gold font-medium m-0">
                <cms:show akzii_sub_title />
            </p>
        </header>

        <div class="space-y-3">
            <cms:show_repeatable 'promo_list'>
                <div class="promo-card fade-up">
                    <h2 class="font-serif-lux text-2xl text-white italic mb-1">
                        <cms:show promo_name />
                    </h2>
                    <p class="text-[12px] text-gray-400 font-light leading-relaxed mb-3 tracking-wide">
                        <cms:show promo_desc />
                    </p>
                    <div class="w-6 h-px bg-[#C5A059]/30 mx-auto mb-3"></div>
                    <p class="text-[9px] uppercase tracking-[0.2em] shimmer-gold font-medium">
                        <cms:show promo_offer />
                    </p>
                </div>
            </cms:show_repeatable>
        </div>

        <footer class="mt-8 text-center fade-up">
            <p class="text-[10px] uppercase tracking-[0.3em] font-medium m-0 italic shimmer-gold">
                <cms:show akzii_footer />
            </p>
        </footer>

        <div class="fade-up">
            <img src="<cms:show akzii_sep />" alt="Разделитель" class="bottom-divider">
        </div>
    </div>
</div>
