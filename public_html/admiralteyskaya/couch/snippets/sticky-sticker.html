<cms:pages masterpage="<cms:show sticky_masterpage />" limit='1'>
<cms:if sticker_enabled='1'>
<cms:set bss_gallery_fallback='udelnaya/gallery.php' />
<cms:if sticky_masterpage='udelnaya/sticky-sticker.php'><cms:set bss_gallery_fallback='gallery.php' /></cms:if>
<cms:set bss_branch_name='Удельная' />
<cms:if sticky_masterpage='udelnaya/sticky-sticker.php'><cms:set bss_branch_name='Адмиралтейская' /></cms:if>
<style>
    #second-garden-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; --gold:#C5A059; --gold-dark:#8e7037; }
    #second-garden-modal .modal-content--branch { max-width: 440px; text-align: left; padding: 28px 22px 24px; }
    #second-garden-modal .close-modal { position: absolute; top: 10px; right: 15px; font-size: 28px; color: var(--gold); cursor: pointer; line-height: 1; transition: color 0.25s ease, opacity 0.25s ease; }
    #second-garden-modal .close-modal:hover { color: #FFEebb; opacity: 0.9; }
    @keyframes bssShineGold { to { background-position: 200% center; } }
    #second-garden-modal .gold-shimmer {
        background: linear-gradient(to right, var(--gold-dark) 0%, var(--gold) 40%, #FFEebb 50%, var(--gold) 60%, var(--gold-dark) 100%);
        background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
        color: transparent; animation: bssShineGold 5s linear infinite;
    }
    .branch-modal-top { text-align: center; margin-bottom: 14px; }
    .branch-modal-logo-top { width: 100px; height: auto; object-fit: contain; display: inline-block; margin-bottom: 8px; }
    .branch-modal-title {
        font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; line-height: 1.25;
        text-align: center; margin: 0 0 10px; color: #fff;
    }
    .branch-modal-branch { display: block; letter-spacing: 0.02em; }
    .second-garden-lead { color: #dcd4be; font-size: 13px; line-height: 1.65; margin: 0; text-align: center; }
    .bss-gallery-widget { margin-top: 16px; }
    .bss-tabs { display: flex; justify-content: center; gap: 24px; margin-bottom: 10px; }
    .bss-tab {
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
        color: rgba(255,255,255,0.45); background: none; border: none; border-bottom: 1px solid transparent;
        padding: 0 0 6px; cursor: pointer; transition: color 0.25s ease, border-color 0.25s ease;
    }
    .bss-tab.active { color: #C5A059; border-bottom-color: #C5A059; }
    .bss-slider-stage { position: relative; }
    .bss-pane { display: none; opacity: 0; transition: opacity 0.35s ease; }
    .bss-pane.active { display: block; opacity: 1; }
    .bss-slider-box { position: relative; }
    .bss-track {
        display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth;
        gap: 10px; scrollbar-width: none; padding: 0 2px 2px; aspect-ratio: 16/10;
    }
    .bss-track::-webkit-scrollbar { display: none; }
    .bss-slide {
        flex: 0 0 88%; scroll-snap-align: start; border-radius: 4px; overflow: hidden;
        aspect-ratio: 16/10; background: #111; border: 1px solid rgba(197,160,89,0.2);
    }
    .bss-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bss-nav {
        position: absolute; top: 50%; transform: translateY(-50%); width: 28px; height: 28px;
        border-radius: 50%; border: 1px solid rgba(197,160,89,0.45); background: rgba(8,8,8,0.92);
        color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
        font-size: 10px; z-index: 3;
    }
    .bss-prev { left: -6px; }
    .bss-next { right: -6px; }
    .bss-modal-action { margin-top: 16px; display: flex; justify-content: center; }
    .bss-modal-action .btn-base {
        display: flex; align-items: center; justify-content: center;
        width: 100%; max-width: 100%; height: 52px;
        border: 1px solid rgba(197,160,89,0.3); text-transform: uppercase;
        font-size: 10px; letter-spacing: 0.15em; text-decoration: none; transition: 0.3s;
        font-family: Montserrat, Arial, sans-serif; cursor: pointer;
    }
    .bss-modal-action .btn-gold-fill { background: var(--gold); color: #000; font-weight: 700; border: none; }
    .bss-modal-action .btn-gold-fill:hover { background: #d4b06a; color: #000; }
    .garden-sticky-wrap {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 120;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        pointer-events: none; display: flex; justify-content: center; align-items: flex-end;
        opacity: 0; visibility: hidden; transform: translateY(100%);
        transition: opacity .45s ease, transform .45s ease, visibility 0s linear .45s;
    }
    .garden-sticky-wrap.is-ready { opacity: 1; visibility: visible; transform: translateY(0); transition: opacity .45s ease, transform .45s ease; pointer-events: none; }
    .garden-sticky-wrap.is-collapsed .garden-sticky-bar { transform: translateY(100%); pointer-events: none; }
    .garden-sticky-wrap.is-collapsed .garden-sticky-unit { height: 0; padding-top: 0; }
    .garden-sticky-unit { position: relative; display: inline-block; max-width: calc(100% - 16px); padding-top: 10px; pointer-events: auto; overflow: visible; }
    .garden-sticky-bar { transform: translateY(0); transition: transform .4s ease; filter: drop-shadow(0 -4px 16px rgba(0,0,0,0.4)); }
    .garden-sticky-tag { display: block; margin: 0; padding: 0; border: 0; background: none; cursor: pointer; line-height: 0; }
    .garden-sticky-tag img { display: block; width: min(calc(100vw - 20px), <cms:show sticker_width />px); height: auto; max-width: 100%; pointer-events: none; }
    .garden-sticky-toggle {
        position: absolute; top: -9px; right: 4px; z-index: 2;
        display: flex; align-items: center; justify-content: center;
        width: 20px; height: 20px; padding: 0;
        border: 1px solid rgba(197,160,89,0.55); border-radius: 50%;
        background: rgba(8,8,8,0.96); color: var(--gold); cursor: pointer; font-size: 9px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.45); pointer-events: auto;
    }
    .garden-sticky-wrap.is-collapsed .garden-sticky-toggle {
        position: fixed; top: auto; right: 0;
        bottom: calc(96px + env(safe-area-inset-bottom, 0px));
        width: 24px; height: 42px; border-radius: 10px 0 0 10px; border-right: none; font-size: 10px;
    }
    body.garden-sticky-active { padding-bottom: calc((min(calc(100vw - 20px), <cms:show sticker_width />px) * 153 / 741) + 12px + env(safe-area-inset-bottom, 0px)); }
    body.garden-sticky-active.garden-sticky-collapsed { padding-bottom: env(safe-area-inset-bottom, 0px); }
</style>

<div class="garden-sticky-wrap" id="garden-sticky-wrap" data-delay="<cms:show appear_delay />" data-storage-key="<cms:show sticky_masterpage />">
    <div class="garden-sticky-unit">
        <button type="button" class="garden-sticky-toggle" onclick="toggleGardenSticky(event)" aria-expanded="true" aria-label="Свернуть подсказку">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="garden-sticky-bar">
            <button type="button" class="garden-sticky-tag" onclick="openSecondGardenInfo()" aria-label="<cms:show sticker_alt />">
                <img src="<cms:show sticker_image />" alt="<cms:show sticker_alt />" width="741" height="153" loading="lazy" decoding="async">
            </button>
        </div>
    </div>
</div>

<div id="second-garden-modal" onclick="closeSecondGardenModal(event)">
    <div class="modal-content modal-content--branch" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeSecondGardenModal()" aria-label="Закрыть">&times;</span>

        <div class="branch-modal-top">
            <img class="branch-modal-logo-top" src="<cms:if modal_logo><cms:show modal_logo /><cms:else />/img/logo-gl.webp</cms:if>" alt="" width="100" height="94" decoding="async">
        </div>

        <div class="branch-modal-intro">
            <h2 class="branch-modal-title">
                <span class="branch-modal-branch gold-shimmer"><cms:if modal_title_branch><cms:show modal_title_branch /><cms:else /><cms:show bss_branch_name /></cms:if></span>
            </h2>
            <cms:if modal_lead><p class="second-garden-lead"><cms:show modal_lead /></p></cms:if>
        </div>

        <div class="bss-gallery-widget" id="bss-gallery-widget">
            <div class="bss-tabs" role="tablist" aria-label="Фото филиала">
                <button type="button" class="bss-tab active" role="tab" aria-selected="true" onclick="bssChangeTab('bss-interior', this)">Interior</button>
                <button type="button" class="bss-tab" role="tab" aria-selected="false" onclick="bssChangeTab('bss-vibe', this)">Vibe</button>
            </div>

            <div class="bss-slider-stage">
                <div id="bss-interior" class="bss-pane active" role="tabpanel">
                    <div class="bss-slider-box">
                        <button type="button" class="bss-nav bss-prev" onclick="branchStickerSlide('bss-track-interior', -1)" aria-label="Назад"><i class="fa-solid fa-chevron-left"></i></button>
                        <div class="bss-track" id="bss-track-interior">
                            <cms:set bss_interior_empty='1' scope='global' />
                            <cms:show_repeatable 'modal_interior_items'>
                                <cms:if slide_image>
                                    <cms:set bss_interior_empty='0' scope='global' />
                                    <div class="bss-slide"><img src="<cms:show slide_image />" alt="<cms:show slide_caption />" loading="lazy"></div>
                                </cms:if>
                            </cms:show_repeatable>
                            <cms:if bss_interior_empty='1'>
                                <cms:pages masterpage="<cms:show bss_gallery_fallback />" limit='1'>
                                    <cms:show_repeatable 'gallery_interior_items'>
                                        <cms:if gallery_img>
                                            <cms:set bss_interior_empty='0' scope='global' />
                                            <div class="bss-slide"><img src="<cms:show gallery_img />" alt="<cms:if gallery_img_alt><cms:show gallery_img_alt /><cms:else /><cms:show gallery_img_title /></cms:if>" loading="lazy"></div>
                                        </cms:if>
                                    </cms:show_repeatable>
                                </cms:pages>
                            </cms:if>
                        </div>
                        <button type="button" class="bss-nav bss-next" onclick="branchStickerSlide('bss-track-interior', 1)" aria-label="Вперёд"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <div id="bss-vibe" class="bss-pane" role="tabpanel">
                    <div class="bss-slider-box">
                        <button type="button" class="bss-nav bss-prev" onclick="branchStickerSlide('bss-track-vibe', -1)" aria-label="Назад"><i class="fa-solid fa-chevron-left"></i></button>
                        <div class="bss-track" id="bss-track-vibe">
                            <cms:set bss_vibe_empty='1' scope='global' />
                            <cms:show_repeatable 'modal_vibe_items'>
                                <cms:if slide_image>
                                    <cms:set bss_vibe_empty='0' scope='global' />
                                    <div class="bss-slide"><img src="<cms:show slide_image />" alt="<cms:show slide_caption />" loading="lazy"></div>
                                </cms:if>
                            </cms:show_repeatable>
                            <cms:if bss_vibe_empty='1'>
                                <cms:pages masterpage="<cms:show bss_gallery_fallback />" limit='1'>
                                    <cms:show_repeatable 'gallery_vibe_items'>
                                        <cms:if gallery_img>
                                            <cms:set bss_vibe_empty='0' scope='global' />
                                            <div class="bss-slide"><img src="<cms:show gallery_img />" alt="<cms:if gallery_img_alt><cms:show gallery_img_alt /><cms:else /><cms:show gallery_img_title /></cms:if>" loading="lazy"></div>
                                        </cms:if>
                                    </cms:show_repeatable>
                                </cms:pages>
                            </cms:if>
                        </div>
                        <button type="button" class="bss-nav bss-next" onclick="branchStickerSlide('bss-track-vibe', 1)" aria-label="Вперёд"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>

            <cms:if modal_site_url>
                <div class="bss-modal-action">
                    <a href="<cms:show modal_site_url />" class="btn-base btn-gold-fill"><cms:show modal_site_label /></a>
                </div>
            </cms:if>
        </div>
    </div>
</div>

<script>
(function() {
    const GARDEN_STICKY_KEY = 'gardenSticky_' + ((document.getElementById('garden-sticky-wrap') || {}).dataset.storageKey || 'default').replace(/[^\w-]/g, '_');
    function setGardenStickyCollapsed(collapsed) {
        const wrap = document.getElementById('garden-sticky-wrap');
        if (!wrap) return;
        const toggle = wrap.querySelector('.garden-sticky-toggle');
        const icon = toggle.querySelector('i');
        wrap.classList.toggle('is-collapsed', collapsed);
        document.body.classList.toggle('garden-sticky-collapsed', collapsed);
        toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
        toggle.setAttribute('aria-label', collapsed ? 'Развернуть подсказку' : 'Свернуть подсказку');
        icon.className = collapsed ? 'fa-solid fa-chevron-left' : 'fa-solid fa-xmark';
        try { sessionStorage.setItem(GARDEN_STICKY_KEY, collapsed ? '1' : '0'); } catch (_) {}
    }
    window.toggleGardenSticky = function(event) {
        event.stopPropagation();
        const wrap = document.getElementById('garden-sticky-wrap');
        setGardenStickyCollapsed(!wrap.classList.contains('is-collapsed'));
    };
    window.openSecondGardenInfo = function() {
        document.getElementById('second-garden-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    };
    window.closeSecondGardenModal = function(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('second-garden-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };
    window.bssChangeTab = function(tabId, btn) {
        document.querySelectorAll('#bss-gallery-widget .bss-pane').forEach(function(el) {
            el.classList.remove('active');
        });
        document.querySelectorAll('#bss-gallery-widget .bss-tab').forEach(function(el) {
            el.classList.remove('active');
            el.setAttribute('aria-selected', 'false');
        });
        const pane = document.getElementById(tabId);
        if (pane) pane.classList.add('active');
        if (btn) {
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
        }
    };
    window.branchStickerSlide = function(trackId, dir) {
        const track = typeof trackId === 'string' ? document.getElementById(trackId) : document.getElementById('bss-track-interior');
        if (!track) return;
        const slide = track.querySelector('.bss-slide');
        const step = slide ? slide.offsetWidth + 10 : 280;
        track.scrollBy({ left: dir * step, behavior: 'smooth' });
    };
    function initGardenSticky() {
        const wrap = document.getElementById('garden-sticky-wrap');
        if (!wrap) return;
        const delay = Math.max(0, parseInt(wrap.dataset.delay || '10', 10)) * 1000;
        setTimeout(function() {
            wrap.classList.add('is-ready');
            document.body.classList.add('garden-sticky-active');
            try {
                if (sessionStorage.getItem(GARDEN_STICKY_KEY) === '1') setGardenStickyCollapsed(true);
            } catch (_) {}
        }, delay);
    }
    document.addEventListener('DOMContentLoaded', initGardenSticky);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSecondGardenModal();
    });
})();
</script>
</cms:if>
</cms:pages>
