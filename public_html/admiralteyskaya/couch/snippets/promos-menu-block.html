<header class="text-center <cms:if promos_variant='visual'>mb-10<cms:else />mb-12</cms:if>">
    <h1 class="font-serif-lux text-3xl text-white font-light italic m-0">
        <cms:show akzii_main_title />
    </h1>
    <div class="gold-line-fade"></div>
    <p class="text-[12px] uppercase tracking-[0.4em] shimmer-gold font-medium m-0">
        <cms:show akzii_sub_title />
    </p>
</header>

<div class="<cms:if promos_variant='visual'>space-y-4<cms:else />space-y-3</cms:if>">
    <cms:show_repeatable 'promo_list'>
        <div class="promo-card">
            <h2 class="font-serif-lux text-2xl text-white font-light italic mb-1">
                <cms:show promo_name />
            </h2>
            <p class="text-[12px] text-gray-400 font-light leading-relaxed mb-3<cms:if promos_variant!='visual'> tracking-wide</cms:if>">
                <cms:show promo_desc />
            </p>
            <cms:if promos_variant!='visual'>
                <div class="w-6 h-px bg-[#C5A059]/30 mx-auto mb-3"></div>
            </cms:if>
            <p class="promo-offer shimmer-gold m-0">
                <cms:show promo_offer />
            </p>
        </div>
    </cms:show_repeatable>
</div>

<cms:if promos_variant!='visual'>
    <footer class="mt-8 text-center">
        <p class="akzii-footer-note m-0 shimmer-gold">
            <cms:show akzii_footer />
        </p>
    </footer>

    <div class="flex justify-center">
        <img src="/admiralteyskaya/couch/uploads/image/div.webp" alt="Разделитель" class="separator-img" loading="lazy" decoding="async">
    </div>
</cms:if>
